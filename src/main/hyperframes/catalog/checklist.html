<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Checklist</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .cl { width: min(800px, 76vw); will-change: transform, opacity; }
    .cl-title { font-size: 30px; margin-bottom: 20px; text-align: center; }
    .cl-items { display: flex; flex-direction: column; gap: 10px; }
    .cl-item {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 18px; border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      will-change: transform, opacity;
    }
    .cl-check {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 13px; font-weight: 700;
      color: #000; will-change: transform, opacity;
    }
    .cl-text { font-size: 22px; line-height: 1.3; }
    .cl-text.dim { color: var(--hf-muted); }
  </style>
</head>
<body>
  <div class="hf-center hf-card cl" id="cl" data-composition-id="checklist" data-start="0" data-duration="4" data-track-index="0">
    <div class="cl-title hf-text-heading" id="title"></div>
    <div class="cl-items" id="items"></div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const title = v.title ?? 'What AI Handles';
    const items = v.items ?? ['Sales calls', 'Lead qualification', 'Follow-up emails', 'Appointment booking'];
    const checked = v.checked ?? [true, true, true, true];
    const accentColor = v.accentColor ?? v.color ?? '#4ade80';
    const yPos = v.yPos ?? 38;

    const clEl = document.getElementById('cl');
    const titleEl = document.getElementById('title');
    const itemsEl = document.getElementById('items');
    clEl.style.top = yPos + '%';
    titleEl.textContent = title;
    titleEl.style.color = accentColor;

    const itemEls = [];
    for (let i = 0; i < items.length; i++) {
      const isOn = checked[i] ?? true;
      const item = document.createElement('div'); item.className = 'cl-item';
      const icon = document.createElement('div');
      icon.className = 'cl-check';
      if (isOn) { icon.style.background = accentColor; icon.textContent = '✓'; }
      else { icon.style.border = '2px solid rgba(255,255,255,0.2)'; }
      const text = document.createElement('div');
      text.className = isOn ? 'cl-text hf-text-body' : 'cl-text hf-text-body dim';
      text.textContent = items[i];
      item.appendChild(icon); item.appendChild(text); itemsEl.appendChild(item);
      itemEls.push(item);
    }

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo(clEl, { opacity: 0, y: 24, scale: 0.95 }, { opacity: 1, y: 0, scale: 1, duration: 0.4, ease: 'back.out(1.2)' }, 0);
    for (let i = 0; i < itemEls.length; i++) {
      tl.fromTo(itemEls[i], { opacity: 0, x: -14 }, { opacity: 1, x: 0, duration: 0.25 }, 0.15 + i * 0.06);
      const c = itemEls[i].querySelector('.cl-check');
      if (c && checked[i] !== false) tl.fromTo(c, { scale: 0 }, { scale: 1, duration: 0.2, ease: 'back.out(2)' }, 0.2 + i * 0.06);
    }
    const dur = parseFloat(v.timingDuration ?? 4);
    tl.to(clEl, { opacity: 0, y: -16, scale: 0.96, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.5, 0.6));
  </script>
</body>
</html>
