<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Voice Spectrum</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .vs-w { width: min(650px, 88vw); display: flex; flex-direction: column; align-items: center; gap: 16px;
      will-change: transform, opacity; }
    .vs-bars { display: flex; align-items: flex-end; gap: 4px; height: 120px; }
    .vs-bar { width: 100%; border-radius: 2px 2px 0 0; transform-origin: bottom; will-change: transform; }
    .vs-label { font-size: 20px; font-weight: 700; text-align: center; letter-spacing: 0.05em; }
    .vs-glow { position: absolute; bottom: -20px; width: 80%; height: 40px; border-radius: 50%;
      filter: blur(30px); opacity: 0.3; z-index: -1; }
  </style>
</head>
<body>
  <div class="hf-center vs-w" id="vsW" data-composition-id="voice-spectrum" data-start="0" data-duration="3" data-track-index="0">
    <div class="vs-bars" id="vsBars"></div>
    <div class="vs-glow" id="vsGlow"></div>
    <div class="vs-label hf-text-heading" id="vsLabel"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const accentColor = v.accentColor ?? '#9f75ff';
    const yPos = v.yPos ?? 50;
    const numBands = v.bands ?? 24;
    const label = v.label ?? 'Frequency Spectrum';

    document.getElementById('vsW').style.top = yPos + '%';
    document.getElementById('vsLabel').textContent = label;
    document.getElementById('vsGlow').style.background = accentColor;

    const barsContainer = document.getElementById('vsBars');
    const barEls = [];
    for (let i = 0; i < numBands; i++) {
      const bar = document.createElement('div');
      bar.className = 'vs-bar';
      const alpha = 0.4 + (i / numBands) * 0.6;
      bar.style.background = accentColor;
      bar.style.opacity = alpha;
      bar.style.height = '8px';
      barsContainer.appendChild(bar);
      barEls.push(bar);
    }

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo('#vsW', { opacity: 0, scale: 0.9 }, { opacity: 1, scale: 1, duration: 0.4, ease: 'back.out(1.2)' }, 0);
    tl.fromTo('#vsLabel', { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.3 }, 0.2);

    function animateBars() {
      const time = gsap.globalTimeline.time();
      for (let i = 0; i < barEls.length; i++) {
        const h = 8 + Math.abs(Math.sin(time * 3 + i * 0.5)) * 100 * (0.5 + Math.abs(Math.sin(time * 2.7 + i * 1.3)) * 0.5);
        barEls[i].style.height = h + 'px';
      }
    }
    gsap.ticker.add(animateBars);

    const dur = parseFloat(v.timingDuration ?? 3);
    tl.to('#vsW', { opacity: 0, scale: 0.9, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.5, 0.6));
  </script>
</body>
</html>
