<!DOCTYPE html>
<html data-width="1080" data-height="1920">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Animated Label</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .label-wrap {
      text-align: center;
      width: min(920px, 90vw);
      will-change: transform, opacity;
    }
    .label-char {
      display: inline-block;
      will-change: transform, opacity;
    }
    .label-char.space {
      width: 0.3em;
    }
  </style>
</head>
<body>

  <div class="hf-center label-wrap" id="labelWrap"
       data-composition-id="animated-label"
       data-start="0"
       data-duration="3"
       data-track-index="0">
    <div id="labelText" class="hf-text hf-title"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    /* ── Props ────────────────────────────────────────────────────── */
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const text      = v.text      ?? 'This Changes Everything';
    const color     = v.color     ?? '#f6ecd9';
    const fontSize  = v.fontSize  ?? 52;
    const animation = v.animation ?? 'typewriter';
    const yPos      = v.yPos      ?? 50;

    /* ── Apply props ──────────────────────────────────────────────── */
    const wrap    = document.getElementById('labelWrap');
    const textEl  = document.getElementById('labelText');

    wrap.style.top = yPos + '%';
    textEl.style.fontSize = fontSize + 'px';
    textEl.style.color = color;

    /* ── Build character spans (needed for stagger animations) ────── */
    const chars = text.split('');
    const charEls = chars.map((ch) => {
      const span = document.createElement('span');
      span.className = ch === ' ' ? 'label-char space' : 'label-char';
      span.textContent = ch === ' ' ? '' : ch;
      return span;
    });
    charEls.forEach((el) => textEl.appendChild(el));

    /* ── GSAP Timeline (varies by animation type) ─────────────────── */
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    switch (animation) {
      case 'typewriter': {
        // Reveal text via clip-path sweeping left → right
        tl.fromTo(textEl,
          { clipPath: 'inset(0 100% 0 0)', opacity: 1 },
          { clipPath: 'inset(0 0% 0 0)', duration: 0.9, ease: 'power2.inOut' },
          0.1
        );
        break;
      }

      case 'slide': {
        // Characters stagger upward from below
        tl.fromTo(charEls,
          { opacity: 0, y: 30 },
          { opacity: 1, y: 0, duration: 0.35, stagger: 0.025, ease: 'back.out(1.6)' },
          0.1
        );
        break;
      }

      case 'fade':
      default: {
        // Characters stagger fade-in
        tl.fromTo(charEls,
          { opacity: 0, scale: 0.7 },
          { opacity: 1, scale: 1, duration: 0.3, stagger: 0.03, ease: 'power2.out' },
          0.1
        );
        break;
      }
    }

    // ── Exit ──
    const dur = parseFloat(v.timingDuration ?? 3);
    const exitStart = Math.max(dur - 0.45, 0.6);

    tl.to(textEl,
      { opacity: 0, y: -12, duration: 0.35, ease: 'power2.in' },
      exitStart
    );
  </script>
</body>
</html>
