<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Delos Alert</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .da-w { width: min(560px, 85vw); will-change: transform, opacity; }
    .da-panel { background: rgba(0,0,0,0.6); border-radius: 14px; overflow: hidden;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); position: relative; }
    .da-stripe { height: 3px; width: 100%; }
    .da-body { padding: 24px; }
    .da-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .da-icon { font-size: 28px; }
    .da-title-wrap { flex: 1; }
    .da-title { font-size: 16px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    .da-severity { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 4px; }
    .da-message { font-size: 16px; color: var(--hf-fg); line-height: 1.5; }
    .da-timestamp { margin-top: 12px; font-size: 11px; color: var(--hf-muted);
      font-family: 'Geist Mono', monospace; }
    .da-border-critical { border: 1px solid rgba(251, 113, 133, 0.3); }
    .da-border-warning { border: 1px solid rgba(251, 191, 36, 0.3); }
    .da-border-info { border: 1px solid rgba(96, 165, 250, 0.3); }
  </style>
</head>
<body>
  <div class="hf-center da-w" id="daW" data-composition-id="delos-alert" data-start="0" data-duration="3.5" data-track-index="0">
    <div class="da-panel" id="daPanel">
      <div class="da-stripe" id="daStripe"></div>
      <div class="da-body">
        <div class="da-header">
          <div class="da-icon" id="daIcon"></div>
          <div class="da-title-wrap">
            <div class="da-title hf-text-heading" id="daTitle"></div>
          </div>
          <div class="da-severity" id="daSeverity"></div>
        </div>
        <div class="da-message hf-text-body" id="daMessage"></div>
        <div class="da-timestamp" id="daTimestamp"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const accentColor = v.accentColor ?? '#9f75ff';
    const yPos = v.yPos ?? 50;
    const title = v.title ?? 'ALERT';
    const message = v.message ?? 'System anomaly detected';
    const severity = v.severity ?? 'warning';

    const severityMap = {
      critical: { color: '#fb7185', icon: '🔴', bg: 'rgba(251,113,133,0.12)', border: 'da-border-critical' },
      warning:  { color: '#fbbf24', icon: '🟡', bg: 'rgba(251,191,36,0.12)', border: 'da-border-warning' },
      info:     { color: '#60a5fa', icon: '🔵', bg: 'rgba(96,165,250,0.12)', border: 'da-border-info' },
      ok:       { color: '#4ade80', icon: '🟢', bg: 'rgba(74,222,128,0.12)', border: 'da-border-info' }
    };
    const sev = severityMap[severity] ?? severityMap.warning;

    document.getElementById('daW').style.top = yPos + '%';
    document.getElementById('daStripe').style.background = sev.color;
    document.getElementById('daPanel').classList.add(sev.border);
    document.getElementById('daIcon').textContent = sev.icon;
    document.getElementById('daTitle').textContent = title;
    document.getElementById('daTitle').style.color = sev.color;
    document.getElementById('daMessage').textContent = message;
    document.getElementById('daSeverity').textContent = severity.toUpperCase();
    document.getElementById('daSeverity').style.background = sev.bg;
    document.getElementById('daSeverity').style.color = sev.color;
    document.getElementById('daTimestamp').textContent = new Date().toISOString();

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo('#daW', { opacity: 0, scale: 0.92, y: 10 }, { opacity: 1, scale: 1, y: 0, duration: 0.4, ease: 'back.out(1.2)' }, 0);
    tl.fromTo('#daIcon', { opacity: 0, scale: 0.5 }, { opacity: 1, scale: 1, duration: 0.25 }, 0.15);
    tl.fromTo('#daTitle', { opacity: 0, x: -8 }, { opacity: 1, x: 0, duration: 0.25 }, 0.2);
    tl.fromTo('#daMessage', { opacity: 0, y: 6 }, { opacity: 1, y: 0, duration: 0.25 }, 0.3);

    if (severity === 'critical') {
      gsap.to('#daStripe', { opacity: 0.5, duration: 0.5, yoyo: true, repeat: -1, ease: 'sine.inOut' });
    }

    const dur = parseFloat(v.timingDuration ?? 3.5);
    tl.to('#daW', { opacity: 0, scale: 0.92, y: -10, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.5, 0.6));
  </script>
</body>
</html>
