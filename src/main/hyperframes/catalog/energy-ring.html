<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Energy Ring</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .er-w { display: flex; flex-direction: column; align-items: center; gap: 20px;
      will-change: transform, opacity; }
    .er-scene { position: relative; width: 260px; height: 260px; }
    .er-ring { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      border-radius: 50%; border: 2px solid; will-change: transform, opacity; }
    .er-pulse { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      border-radius: 50%; border: 1px solid; opacity: 0; }
    .er-label { font-size: 22px; font-weight: 700; text-align: center; }
    .er-ambient { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 240px; height: 240px; border-radius: 50%; filter: blur(50px); opacity: 0.2; z-index: -1; }
  </style>
</head>
<body>
  <div class="hf-center er-w" id="erW" data-composition-id="energy-ring" data-start="0" data-duration="3.5" data-track-index="0">
    <div class="er-scene">
      <div class="er-ambient" id="erAmbient"></div>
      <div class="er-ring" id="erR1"></div>
      <div class="er-ring" id="erR2"></div>
      <div class="er-ring" id="erR3"></div>
      <div class="er-ring" id="erR4"></div>
      <div class="er-pulse" id="erPulse1"></div>
      <div class="er-pulse" id="erPulse2"></div>
    </div>
    <div class="er-label hf-text-heading" id="erLabel"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const accentColor = v.accentColor ?? '#9f75ff';
    const yPos = v.yPos ?? 50;
    const numRings = v.rings ?? 4;
    const label = v.label ?? 'Energy Field';

    document.getElementById('erW').style.top = yPos + '%';
    document.getElementById('erLabel').textContent = label;
    document.getElementById('erAmbient').style.background = accentColor;

    const ringConfigs = [
      { id: 'erR1', size: 220, opacity: 0.5, width: 2, speed: 6, dir: 1 },
      { id: 'erR2', size: 180, opacity: 0.4, width: 1.5, speed: 8, dir: -1 },
      { id: 'erR3', size: 140, opacity: 0.35, width: 1.5, speed: 5, dir: 1 },
      { id: 'erR4', size: 100, opacity: 0.3, width: 1, speed: 10, dir: -1 }
    ].slice(0, numRings);

    ringConfigs.forEach(cfg => {
      const el = document.getElementById(cfg.id);
      el.style.width = cfg.size + 'px';
      el.style.height = cfg.size + 'px';
      el.style.borderColor = accentColor;
      el.style.borderWidth = cfg.width + 'px';
      el.style.opacity = cfg.opacity;
      el.style.boxShadow = `0 0 10px ${accentColor}44, inset 0 0 10px ${accentColor}22`;
      el.style.borderStyle = cfg.dir > 0 ? 'solid' : 'dashed';
    });

    // Pulse rings
    const pulse1 = document.getElementById('erPulse1');
    const pulse2 = document.getElementById('erPulse2');
    [pulse1, pulse2].forEach(p => {
      p.style.borderColor = accentColor;
      p.style.width = '60px'; p.style.height = '60px';
    });

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo('#erW', { opacity: 0, scale: 0.85 }, { opacity: 1, scale: 1, duration: 0.5, ease: 'back.out(1.3)' }, 0);
    ringConfigs.forEach((cfg, i) => {
      tl.fromTo(`#${cfg.id}`, { opacity: 0, scale: 0.5 }, { opacity: cfg.opacity, scale: 1, duration: 0.35, ease: 'back.out(1.2)' }, 0.1 + i * 0.08);
    });
    tl.fromTo('#erLabel', { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.3 }, 0.4);

    ringConfigs.forEach(cfg => {
      gsap.to(`#${cfg.id}`, { rotation: cfg.dir * 360, duration: cfg.speed, repeat: -1, ease: 'none', transformOrigin: 'center center' });
    });

    // Expanding pulse animation
    gsap.to(pulse1, { scale: 8, opacity: 0, duration: 2, repeat: -1, ease: 'power1.out' });
    gsap.to(pulse2, { scale: 8, opacity: 0, duration: 2, repeat: -1, ease: 'power1.out', delay: 1 });
    gsap.to('#erAmbient', { opacity: 0.3, duration: 2, yoyo: true, repeat: -1, ease: 'sine.inOut' });

    const dur = parseFloat(v.timingDuration ?? 3.5);
    tl.to('#erW', { opacity: 0, scale: 0.9, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.5, 0.6));
  </script>
</body>
</html>
