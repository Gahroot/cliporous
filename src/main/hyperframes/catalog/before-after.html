<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Before / After</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .cmp { display: flex; align-items: stretch; gap: 20px; width: min(920px, 88vw); will-change: transform, opacity; }
    .cmp-col {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 28px 16px; border-radius: 16px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      will-change: transform, opacity;
    }
    .cmp-right { border-color: rgba(255,255,255,0.15); box-shadow: 0 0 40px rgba(74,222,128,0.08); }
    .cmp-icon { font-size: 36px; margin-bottom: 10px; }
    .cmp-label { font-size: 13px; font-weight: 600; letter-spacing: 0.1em; margin-bottom: 8px; text-transform: uppercase; }
    .cmp-value { font-size: 30px; font-weight: 700; line-height: 1.2; }
    .cmp-vs { display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .cmp-vs-text { font-size: 16px; font-weight: 700; color: var(--hf-muted); width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div class="hf-center cmp" id="cmp" data-composition-id="before-after" data-start="0" data-duration="3.5" data-track-index="0">
    <div class="cmp-col" id="left">
      <div class="cmp-icon" id="leftIcon"></div>
      <div class="cmp-label hf-text-label" id="leftLabel"></div>
      <div class="cmp-value hf-text-heading" id="leftValue"></div>
    </div>
    <div class="cmp-vs"><div class="cmp-vs-text">VS</div></div>
    <div class="cmp-col cmp-right" id="right">
      <div class="cmp-icon" id="rightIcon"></div>
      <div class="cmp-label hf-text-label" id="rightLabel"></div>
      <div class="cmp-value hf-text-heading" id="rightValue"></div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const accentColor = v.accentColor ?? v.color ?? '#4ade80';
    const yPos = v.yPos ?? 50;
    document.getElementById('cmp').style.top = yPos + '%';
    document.getElementById('leftIcon').textContent = v.leftIcon ?? '📋';
    document.getElementById('leftLabel').textContent = v.leftLabel ?? 'MANUAL';
    document.getElementById('leftValue').textContent = v.leftValue ?? '10 hrs/week';
    document.getElementById('rightIcon').textContent = v.rightIcon ?? '🤖';
    document.getElementById('rightLabel').textContent = v.rightLabel ?? 'WITH AI';
    document.getElementById('rightLabel').style.color = accentColor;
    document.getElementById('rightValue').textContent = v.rightValue ?? '10 min/week';

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo('#cmp', { opacity: 0, y: 24, scale: 0.95 }, { opacity: 1, y: 0, scale: 1, duration: 0.4, ease: 'back.out(1.2)' }, 0);
    tl.fromTo('#left', { opacity: 0, x: -16 }, { opacity: 1, x: 0, duration: 0.3 }, 0.1);
    tl.fromTo('#right', { opacity: 0, x: 16 }, { opacity: 1, x: 0, duration: 0.3 }, 0.15);
    tl.fromTo('.cmp-vs-text', { opacity: 0, scale: 0 }, { opacity: 1, scale: 1, duration: 0.25, ease: 'back.out(2)' }, 0.2);
    const dur = parseFloat(v.timingDuration ?? 3.5);
    tl.to('#cmp', { opacity: 0, y: -16, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.5, 0.6));
  </script>
</body>
</html>
