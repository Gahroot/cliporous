<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Delos Console</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .dc-w { width: min(650px, 88vw); will-change: transform, opacity; }
    .dc-panel { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      overflow: hidden; position: relative; }
    .dc-scan { position: absolute; left: 0; right: 0; height: 2px; opacity: 0.3; }
    .dc-header { padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex; justify-content: space-between; align-items: center; }
    .dc-title { font-size: 14px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
    .dc-status { display: flex; align-items: center; gap: 8px; }
    .dc-status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .dc-status-text { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
    .dc-body { padding: 20px 24px; }
    .dc-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .dc-metric { text-align: center; padding: 14px 8px; background: rgba(255,255,255,0.03);
      border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
    .dc-metric-value { font-size: 24px; font-weight: 700; font-family: 'Geist Mono', monospace; }
    .dc-metric-label { font-size: 11px; color: var(--hf-muted); font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; margin-top: 6px; }
    .dc-footer { padding: 12px 24px; border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; justify-content: space-between; }
    .dc-footer-text { font-size: 11px; color: var(--hf-muted); font-family: 'Geist Mono', monospace; }
  </style>
</head>
<body>
  <div class="hf-center dc-w" id="dcW" data-composition-id="delos-console" data-start="0" data-duration="3.5" data-track-index="0">
    <div class="dc-panel hf-scanlines">
      <div class="dc-scan" id="dcScan"></div>
      <div class="dc-header">
        <div class="dc-title hf-text-heading" id="dcTitle"></div>
        <div class="dc-status">
          <div class="dc-status-dot" id="dcDot"></div>
          <div class="dc-status-text" id="dcStatus"></div>
        </div>
      </div>
      <div class="dc-body">
        <div class="dc-metrics" id="dcMetrics"></div>
      </div>
      <div class="dc-footer">
        <span class="dc-footer-text" id="dcFooter"></span>
        <span class="dc-footer-text" id="dcTimestamp"></span>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const accentColor = v.accentColor ?? '#9f75ff';
    const yPos = v.yPos ?? 50;
    const title = v.title ?? 'AI SYSTEM';
    const statusText = v.statusText ?? 'OPERATIONAL';
    const metrics = v.metrics ?? [
      { label: 'Uptime', value: '99.9%' },
      { label: 'Hosts', value: '2,048' },
      { label: 'Fidelity', value: '98.7%' }
    ];

    document.getElementById('dcW').style.top = yPos + '%';
    document.getElementById('dcTitle').textContent = title;
    document.getElementById('dcStatus').textContent = statusText;
    document.getElementById('dcStatus').style.color = accentColor;
    document.getElementById('dcDot').style.background = accentColor;
    document.getElementById('dcDot').style.boxShadow = `0 0 8px ${accentColor}`;
    document.getElementById('dcScan').style.background = `linear-gradient(90deg, transparent, ${accentColor}, transparent)`;
    document.getElementById('dcFooter').textContent = v.footerText ?? 'AI SYSTEM';
    document.getElementById('dcTimestamp').textContent = new Date().toISOString().split('T')[0];

    const metricsEl = document.getElementById('dcMetrics');
    metrics.forEach(m => {
      const el = document.createElement('div');
      el.className = 'dc-metric';
      el.innerHTML = `
        <div class="dc-metric-value" style="color:${accentColor}">${m.value}</div>
        <div class="dc-metric-label">${m.label}</div>`;
      metricsEl.appendChild(el);
    });

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo('#dcW', { opacity: 0, scale: 0.92 }, { opacity: 1, scale: 1, duration: 0.4, ease: 'back.out(1.2)' }, 0);
    tl.fromTo('.dc-metric', { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.25, stagger: 0.08 }, 0.2);
    gsap.to('#dcScan', { top: '100%', duration: 2.5, repeat: -1, ease: 'none' });

    const dur = parseFloat(v.timingDuration ?? 3.5);
    tl.to('#dcW', { opacity: 0, scale: 0.92, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.5, 0.6));
  </script>
</body>
</html>
