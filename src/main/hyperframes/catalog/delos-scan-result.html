<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Delos Scan Result</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .dsr-w { width: min(560px, 85vw); will-change: transform, opacity; }
    .dsr-panel { background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 28px; backdrop-filter: blur(20px); position: relative; overflow: hidden; }
    .dsr-scan { position: absolute; left: 0; right: 0; height: 2px; opacity: 0.3; }
    .dsr-title { font-size: 14px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      text-align: center; margin-bottom: 20px; }
    .dsr-progress-wrap { margin-bottom: 24px; }
    .dsr-progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .dsr-progress-label { font-size: 12px; color: var(--hf-muted); font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase; }
    .dsr-progress-value { font-size: 12px; font-weight: 700; font-family: 'Geist Mono', monospace; }
    .dsr-progress-track { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .dsr-progress-fill { height: 100%; border-radius: 2px; transform-origin: left; will-change: transform; }
    .dsr-findings { display: flex; flex-direction: column; gap: 10px; }
    .dsr-finding { display: flex; align-items: center; gap: 10px; padding: 8px 12px;
      background: rgba(255,255,255,0.03); border-radius: 6px; }
    .dsr-finding-icon { font-size: 16px; }
    .dsr-finding-text { font-size: 14px; font-weight: 500; }
  </style>
</head>
<body>
  <div class="hf-center dsr-w" id="dsrW" data-composition-id="delos-scan-result" data-start="0" data-duration="3.5" data-track-index="0">
    <div class="dsr-panel">
      <div class="dsr-scan" id="dsrScan"></div>
      <div class="dsr-title hf-text-heading" id="dsrTitle"></div>
      <div class="dsr-progress-wrap">
        <div class="dsr-progress-header">
          <span class="dsr-progress-label">Scan Progress</span>
          <span class="dsr-progress-value" id="dsrProgressValue"></span>
        </div>
        <div class="dsr-progress-track">
          <div class="dsr-progress-fill" id="dsrFill"></div>
        </div>
      </div>
      <div class="dsr-findings" id="dsrFindings"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const accentColor = v.accentColor ?? '#9f75ff';
    const yPos = v.yPos ?? 50;
    const title = v.title ?? 'SCAN COMPLETE';
    const findings = v.findings ?? ['Fidelity normal', 'No anomalies', 'Memory intact'];
    const progress = v.progress ?? 100;

    document.getElementById('dsrW').style.top = yPos + '%';
    document.getElementById('dsrTitle').textContent = title;
    document.getElementById('dsrTitle').style.color = accentColor;
    document.getElementById('dsrScan').style.background = `linear-gradient(90deg, transparent, ${accentColor}, transparent)`;
    document.getElementById('dsrFill').style.background = accentColor;

    const fill = document.getElementById('dsrFill');
    fill.style.width = '0%';

    const findingsEl = document.getElementById('dsrFindings');
    findings.forEach(f => {
      const el = document.createElement('div');
      el.className = 'dsr-finding';
      el.innerHTML = `<span class="dsr-finding-icon">✓</span><span class="dsr-finding-text">${f}</span>`;
      el.querySelector('.dsr-finding-icon').style.color = '#4ade80';
      findingsEl.appendChild(el);
    });

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo('#dsrW', { opacity: 0, scale: 0.92 }, { opacity: 1, scale: 1, duration: 0.4, ease: 'back.out(1.2)' }, 0);
    tl.to(fill, { width: progress + '%', duration: 0.6, ease: 'power2.out', onUpdate: function() {
      document.getElementById('dsrProgressValue').textContent = Math.round(progress * this.progress()) + '%';
    }}, 0.15);
    tl.fromTo('.dsr-finding', { opacity: 0, x: -10 }, { opacity: 1, x: 0, duration: 0.2, stagger: 0.08 }, 0.4);
    gsap.to('#dsrScan', { top: '100%', duration: 2, repeat: -1, ease: 'none' });

    const dur = parseFloat(v.timingDuration ?? 3.5);
    tl.to('#dsrW', { opacity: 0, scale: 0.92, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.5, 0.6));
  </script>
</body>
</html>
