<!DOCTYPE html>
<html data-width="1080" data-height="1920">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Popup Card</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .card {
      --card-radius: 20px;
      width: min(820px, 78vw);
      text-align: center;
      will-change: transform, opacity;
    }
    .card-icon {
      font-size: 56px;
      line-height: 1;
      margin-bottom: 16px;
      will-change: transform, opacity;
    }
    .card-title {
      font-size: 42px;
      line-height: 1.15;
      will-change: transform, opacity;
    }
    .card-subtitle {
      font-size: 26px;
      margin-top: 10px;
      will-change: transform, opacity;
    }
  </style>
</head>
<body>

  <div class="hf-center hf-card card" id="card"
       data-composition-id="popup-card"
       data-start="0"
       data-duration="3"
       data-track-index="0">
    <div class="card-icon hf-text" id="icon"></div>
    <div class="card-title hf-text hf-title" id="title"></div>
    <div class="card-subtitle hf-text hf-subtitle" id="subtitle"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    /* ── Props ────────────────────────────────────────────────────── */
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const text       = v.text       ?? 'Feature Callout';
    const subtitle   = v.subtitle   ?? 'Subtitle text goes here';
    const icon       = v.icon       ?? '✨';
    const color      = v.color      ?? '#9f75ff';
    const fontSize   = v.fontSize   ?? 42;
    const borderRadius = v.borderRadius ?? 20;
    const yPos       = v.yPos       ?? 35;

    /* ── Apply props to DOM ───────────────────────────────────────── */
    const card      = document.getElementById('card');
    const iconEl    = document.getElementById('icon');
    const titleEl   = document.getElementById('title');
    const subtitleEl = document.getElementById('subtitle');

    card.style.borderRadius = borderRadius + 'px';
    card.style.top = yPos + '%';

    iconEl.textContent = icon;
    titleEl.textContent = text;
    titleEl.style.fontSize = fontSize + 'px';
    titleEl.style.color = color;

    if (subtitle) {
      subtitleEl.textContent = subtitle;
      subtitleEl.style.fontSize = Math.round(fontSize * 0.62) + 'px';
      subtitleEl.style.color = color;
    } else {
      subtitleEl.style.display = 'none';
    }

    /* ── GSAP Timeline ───────────────────────────────────────────── */
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    // Card slides up + fades in
    tl.fromTo(card,
      { opacity: 0, y: 40, scale: 0.92 },
      { opacity: 1, y: 0, scale: 1, duration: 0.45, ease: 'back.out(1.4)' },
      0
    );

    // Icon pops in with elastic bounce
    tl.fromTo(iconEl,
      { opacity: 0, scale: 0, rotation: -15 },
      { opacity: 1, scale: 1, rotation: 0, duration: 0.5, ease: 'elastic.out(1, 0.5)' },
      0.12
    );

    // Title slides up + fades in
    tl.fromTo(titleEl,
      { opacity: 0, y: 14 },
      { opacity: 1, y: 0, duration: 0.35 },
      0.22
    );

    // Subtitle slides up + fades in
    if (subtitle) {
      tl.fromTo(subtitleEl,
        { opacity: 0, y: 12 },
        { opacity: 1, y: 0, duration: 0.35 },
        0.32
      );
    }

    // ── Exit ──
    const dur = parseFloat(v.timingDuration ?? 3);
    const exitStart = Math.max(dur - 0.5, 0.6);

    tl.to(card,
      { opacity: 0, y: -20, scale: 0.96, duration: 0.4, ease: 'power2.in' },
      exitStart
    );
  </script>
</body>
</html>
