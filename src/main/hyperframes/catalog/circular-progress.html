<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Circular Progress</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .cp-w { display: flex; flex-direction: column; align-items: center; gap: 14px;
      will-change: transform, opacity; }
    .cp-ring-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
    .cp-svg { transform: rotate(-90deg); }
    .cp-track { fill: none; stroke: rgba(255,255,255,0.08); }
    .cp-fill { fill: none; stroke-linecap: round; }
    .cp-num { position: absolute; font-size: 40px; font-weight: 700; font-family: 'Inter', sans-serif;
      color: #fff; text-shadow: var(--hf-text-shadow); }
    .cp-label { font-size: 18px; font-weight: 500; color: var(--hf-muted); text-align: center; }
    .cp-glow { position: absolute; border-radius: 50%; filter: blur(40px); opacity: 0.2; z-index: -1; }
  </style>
</head>
<body>
  <div class="hf-center cp-w" id="cpW" data-composition-id="circular-progress" data-start="0" data-duration="3" data-track-index="0">
    <div class="cp-glow" id="cpGlow"></div>
    <div class="cp-ring-wrap">
      <svg class="cp-svg" id="cpSvg" width="180" height="180" viewBox="0 0 180 180">
        <circle class="cp-track" cx="90" cy="90" r="75" stroke-width="10"/>
        <circle class="cp-fill" id="cpFill" cx="90" cy="90" r="75" stroke-width="10"/>
      </svg>
      <div class="cp-num" id="cpNum"></div>
    </div>
    <div class="cp-label hf-text-body" id="cpLabel"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const percent = v.percent ?? 75;
    const accentColor = v.accentColor ?? '#9f75ff';
    const yPos = v.yPos ?? 50;

    document.getElementById('cpW').style.top = yPos + '%';
    document.getElementById('cpGlow').style.background = accentColor;
    document.getElementById('cpFill').style.stroke = accentColor;

    const fill = document.getElementById('cpFill');
    const r = parseFloat(fill.getAttribute('r'));
    const circ = 2 * Math.PI * r;
    fill.style.strokeDasharray = circ;
    fill.style.strokeDashoffset = circ;

    document.getElementById('cpNum').textContent = Math.round(percent) + '%';
    document.getElementById('cpLabel').textContent = v.label ?? 'Progress';

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo('#cpGlow', { opacity: 0, scale: 0.5 }, { opacity: 0.2, scale: 1, duration: 0.5 }, 0);
    tl.fromTo('#cpW', { opacity: 0, scale: 0.9 }, { opacity: 1, scale: 1, duration: 0.4, ease: 'back.out(1.2)' }, 0.1);
    tl.to(fill, { strokeDashoffset: circ * (1 - percent / 100), duration: 0.7, ease: 'power2.out' }, 0.2);
    tl.fromTo('#cpNum', { opacity: 0, scale: 0.8 }, { opacity: 1, scale: 1, duration: 0.3 }, 0.3);
    tl.fromTo('#cpLabel', { opacity: 0, y: 6 }, { opacity: 1, y: 0, duration: 0.25 }, 0.35);

    const dur = parseFloat(v.timingDuration ?? 3);
    tl.to('#cpW', { opacity: 0, scale: 0.9, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.5, 0.6));
  </script>
</body>
</html>
