<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Transcript Stream</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .ts-w { width: min(680px, 92vw); display: flex; flex-direction: column; gap: 12px;
      will-change: transform, opacity; }
    .ts-header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .ts-header-dot { width: 8px; height: 8px; border-radius: 50%; animation: hf-blink 1s step-end infinite; }
    .ts-header-text { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--hf-muted); }
    .ts-words { display: flex; flex-wrap: wrap; gap: 6px; }
    .ts-word { font-size: 28px; font-weight: 600; color: var(--hf-fg); text-shadow: var(--hf-text-shadow); }
    .ts-word-new { color: var(--accent); }
    .ts-cursor { display: inline-block; width: 2px; height: 1em; background: var(--hf-accent);
      vertical-align: text-bottom; animation: hf-blink 1s step-end infinite; }
  </style>
</head>
<body>
  <div class="hf-center ts-w" id="tsW" data-composition-id="transcript-stream" data-start="0" data-duration="4" data-track-index="0">
    <div class="ts-header">
      <div class="ts-header-dot" id="tsDot"></div>
      <div class="ts-header-text" id="tsHeaderText"></div>
    </div>
    <div class="ts-words" id="tsWords">
      <span class="ts-cursor" id="tsCursor"></span>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const accentColor = v.accentColor ?? '#9f75ff';
    const yPos = v.yPos ?? 50;
    const words = v.words ?? ['Hello', 'world', 'this', 'is', 'a', 'live', 'transcript'];
    const headerText = v.label ?? 'LIVE TRANSCRIPT';

    document.getElementById('tsW').style.top = yPos + '%';
    document.getElementById('tsHeaderText').textContent = headerText;
    document.getElementById('tsDot').style.background = accentColor;

    const wordsContainer = document.getElementById('tsWords');
    const cursor = document.getElementById('tsCursor');
    const dur = parseFloat(v.timingDuration ?? 4);

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo('#tsW', { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.4, ease: 'back.out(1.2)' }, 0);

    const wordDelay = Math.max((dur - 0.8) / words.length, 0.05);
    words.forEach((word, i) => {
      tl.call(() => {
        const span = document.createElement('span');
        span.className = 'ts-word';
        span.textContent = word;
        wordsContainer.insertBefore(span, cursor);
        gsap.fromTo(span, { opacity: 0, y: 6 }, { opacity: 1, y: 0, duration: 0.15 });
      }, null, 0.4 + i * wordDelay);
    });

    tl.to('#tsW', { opacity: 0, y: -12, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.4, 0.6));
  </script>
</body>
</html>
