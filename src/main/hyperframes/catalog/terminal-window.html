<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Terminal Window</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .term { width: min(840px, 80vw); border-radius: 14px; overflow: hidden; will-change: transform, opacity;
      background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 2px 12px rgba(0,0,0,0.3);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
    .term-bar { display: flex; align-items: center; gap: 8px; padding: 14px 18px;
      background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.06); }
    .term-dot { width: 12px; height: 12px; border-radius: 50%; }
    .term-dot-r { background: #fb7185; } .term-dot-a { background: #fbbf24; } .term-dot-g { background: #4ade80; }
    .term-title { flex: 1; text-align: center; font-size: 13px; font-weight: 500; color: var(--hf-muted); margin-right: 44px; }
    .term-body { padding: 24px 28px; min-height: 160px; }
    .term-line { font-size: 18px; line-height: 1.7; white-space: pre-wrap; will-change: opacity; }
    .term-cmd { color: #ffffff; }
    .term-out { color: var(--hf-muted); }
    .term-ok { color: #4ade80; }
  </style>
</head>
<body>
  <div class="hf-center term" id="term" data-composition-id="terminal-window" data-start="0" data-duration="4" data-track-index="0">
    <div class="term-bar">
      <div class="term-dot term-dot-r"></div><div class="term-dot term-dot-a"></div><div class="term-dot term-dot-g"></div>
      <div class="term-title" id="winTitle">AI Agent</div>
    </div>
    <div class="term-body" id="body"></div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const accentColor = v.accentColor ?? v.color ?? '#4ade80';
    const yPos = v.yPos ?? 50;
    document.getElementById('term').style.top = yPos + '%';
    document.getElementById('winTitle').textContent = v.title ?? 'AI Agent';
    const bodyEl = document.getElementById('body');
    const lines = [];
    const cmdLine = document.createElement('div'); cmdLine.className = 'term-line term-cmd';
    cmdLine.innerHTML = `<span style="color:${accentColor}">$</span> ${(v.command ?? '$ deploy-agent').replace(/^\$\s*/, '')}`;
    cmdLine.style.opacity = '0'; bodyEl.appendChild(cmdLine); lines.push(cmdLine);
    const cursor = document.createElement('span'); cursor.className = 'hf-cursor'; cursor.style.opacity = '0'; cmdLine.appendChild(cursor);
    const outputLines = (v.output ?? 'Done ✓').split('\n');
    for (const line of outputLines) {
      const el = document.createElement('div'); const t = line.trim();
      el.className = t.includes('✓') || t.includes('active') || t.includes('done') ? 'term-line term-ok' : 'term-line term-out';
      el.textContent = t; el.style.opacity = '0'; bodyEl.appendChild(el); lines.push(el);
    }
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo('#term', { opacity: 0, y: 24, scale: 0.95 }, { opacity: 1, y: 0, scale: 1, duration: 0.4, ease: 'back.out(1.2)' }, 0);
    tl.to(cmdLine, { opacity: 1, duration: 0.15 }, 0.15); tl.to(cursor, { opacity: 1, duration: 0.05 }, 0.15);
    for (let i = 1; i < lines.length; i++) tl.fromTo(lines[i], { opacity: 0, y: 4 }, { opacity: 1, y: 0, duration: 0.15 }, 0.25 + (i-1)*0.1);
    const dur = parseFloat(v.timingDuration ?? 4);
    tl.to('#term', { opacity: 0, y: -16, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.5, 0.6));
  </script>
</body>
</html>
