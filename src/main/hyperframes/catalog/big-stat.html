<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Big Stat</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .stat { text-align: center; width: 900px; will-change: transform, opacity; }
    .stat-number {
      font-family: 'Inter', sans-serif; font-weight: 700;
      font-size: 140px; line-height: 1; letter-spacing: -0.03em;
      color: #ffffff; will-change: transform, opacity;
    }
    .stat-prefix { font-size: 72px; vertical-align: top; margin-right: 4px; opacity: 0.85; }
    .stat-label { font-size: 26px; line-height: 1.4; margin-top: 16px; will-change: transform, opacity; color: var(--hf-muted); }
    .stat-glow {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 300px; height: 300px; border-radius: 50%;
      filter: blur(80px); opacity: 0.25; z-index: -1;
    }
  </style>
</head>
<body>
  <div class="hf-center stat" id="stat" data-composition-id="big-stat" data-start="0" data-duration="3" data-track-index="0">
    <div class="stat-glow" id="glow"></div>
    <div class="stat-number" id="number"></div>
    <div class="stat-label hf-text-body" id="label"></div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const number = v.number ?? '80%';
    const label = v.label ?? 'of tasks automated';
    const prefix = v.prefix ?? '';
    const accentColor = v.accentColor ?? v.color ?? '#4ade80';
    const yPos = v.yPos ?? 50;
    const statEl = document.getElementById('stat');
    const glowEl = document.getElementById('glow');
    const numberEl = document.getElementById('number');
    const labelEl = document.getElementById('label');
    statEl.style.top = yPos + '%';
    glowEl.style.background = accentColor;
    numberEl.textContent = prefix ? prefix + number.replace(prefix, '') : number;
    labelEl.textContent = label;

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo(glowEl, { opacity: 0, scale: 0.5 }, { opacity: 0.25, scale: 1, duration: 0.6 }, 0);
    tl.fromTo(numberEl, { opacity: 0, y: 30, scale: 0.9 }, { opacity: 1, y: 0, scale: 1, duration: 0.45, ease: 'back.out(1.2)' }, 0.1);
    tl.fromTo(labelEl, { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.3 }, 0.25);
    tl.to(glowEl, { opacity: 0.35, duration: 1.0, yoyo: true, repeat: -1, ease: 'sine.inOut' }, 0.5);
    const dur = parseFloat(v.timingDuration ?? 3);
    tl.to(statEl, { opacity: 0, y: -16, scale: 0.95, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.5, 0.6));
  </script>
</body>
</html>
