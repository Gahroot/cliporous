<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Glowing Cube</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .gc-w { display: flex; flex-direction: column; align-items: center; gap: 20px;
      will-change: transform, opacity; }
    .gc-scene { position: relative; width: 200px; height: 200px;
      perspective: 500px; }
    .gc-cube { position: absolute; left: 50%; top: 50%;
      width: 100px; height: 100px;
      transform-style: preserve-3d;
      transform: translate(-50%, -50%) rotateX(-20deg) rotateY(30deg); }
    .gc-face { position: absolute; width: 100px; height: 100px;
      border: 1.5px solid; backface-visibility: visible; }
    .gc-face-front  { transform: translateZ(50px); }
    .gc-face-back   { transform: translateZ(-50px) rotateY(180deg); }
    .gc-face-left   { transform: translateX(-50px) rotateY(-90deg); }
    .gc-face-right  { transform: translateX(50px) rotateY(90deg); }
    .gc-face-top    { transform: translateY(-50px) rotateX(90deg); }
    .gc-face-bottom { transform: translateY(50px) rotateX(-90deg); }
    .gc-icon { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      font-size: 36px; z-index: 2; }
    .gc-label { font-size: 22px; font-weight: 700; text-align: center; }
    .gc-ambient { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 180px; height: 180px; border-radius: 50%; filter: blur(50px); opacity: 0.2; z-index: -1; }
  </style>
</head>
<body>
  <div class="hf-center gc-w" id="gcW" data-composition-id="glowing-cube" data-start="0" data-duration="3.5" data-track-index="0">
    <div class="gc-scene">
      <div class="gc-ambient" id="gcAmbient"></div>
      <div class="gc-cube" id="gcCube">
        <div class="gc-face gc-face-front"></div>
        <div class="gc-face gc-face-back"></div>
        <div class="gc-face gc-face-left"></div>
        <div class="gc-face gc-face-right"></div>
        <div class="gc-face gc-face-top"></div>
        <div class="gc-face gc-face-bottom"></div>
      </div>
      <div class="gc-icon" id="gcIcon"></div>
    </div>
    <div class="gc-label hf-text-heading" id="gcLabel"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const accentColor = v.accentColor ?? '#9f75ff';
    const yPos = v.yPos ?? 50;
    const icon = v.icon ?? '📦';
    const label = v.label ?? 'Cube';

    document.getElementById('gcW').style.top = yPos + '%';
    document.getElementById('gcIcon').textContent = icon;
    document.getElementById('gcLabel').textContent = label;
    document.getElementById('gcAmbient').style.background = accentColor;

    const faces = document.querySelectorAll('.gc-face');
    faces.forEach(f => {
      f.style.borderColor = accentColor + '88';
      f.style.background = accentColor + '0a';
      f.style.boxShadow = `0 0 12px ${accentColor}22, inset 0 0 12px ${accentColor}0a`;
    });

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo('#gcW', { opacity: 0, scale: 0.85 }, { opacity: 1, scale: 1, duration: 0.5, ease: 'back.out(1.3)' }, 0);
    tl.fromTo('#gcIcon', { opacity: 0 }, { opacity: 1, duration: 0.3 }, 0.2);
    tl.fromTo('#gcLabel', { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.3 }, 0.35);

    gsap.to('#gcCube', { rotationY: '+=360', rotationX: '+=360', duration: 10, repeat: -1, ease: 'none',
      transformOrigin: 'center center' });
    gsap.to('#gcAmbient', { opacity: 0.3, duration: 2, yoyo: true, repeat: -1, ease: 'sine.inOut' });

    const dur = parseFloat(v.timingDuration ?? 3.5);
    tl.to('#gcW', { opacity: 0, scale: 0.9, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.5, 0.6));
  </script>
</body>
</html>
