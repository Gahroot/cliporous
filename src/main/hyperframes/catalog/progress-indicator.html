<!DOCTYPE html>
<html data-width="1080" data-height="1920">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Progress Indicator</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    /* ── Container ────────────────────────────────────────────────── */
    .progress-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      will-change: transform, opacity;
    }

    /* ── Dots style ───────────────────────────────────────────────── */
    .dots {
      gap: 18px;
    }
    .dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.25);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      will-change: transform, background, color;
    }
    .dot.filled {
      color: #fff;
    }
    .dot-label {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      color: #f6ecd9;
      white-space: nowrap;
      margin-left: 8px;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.5);
    }

    /* ── Bar style ────────────────────────────────────────────────── */
    .bar-outer {
      height: 10px;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.12);
      overflow: visible;
      position: relative;
    }
    .bar-inner {
      height: 100%;
      border-radius: 5px;
      position: relative;
      will-change: width;
    }
    .bar-head {
      position: absolute;
      right: -6px;
      top: -5px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      filter: blur(5px);
      opacity: 0.7;
    }
    .bar-text {
      position: absolute;
      right: 0;
      top: -28px;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: #f6ecd9;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.5);
    }

    /* ── Circle style ─────────────────────────────────────────────── */
    .circle-wrap {
      position: relative;
    }
    .circle-svg {
      transform: rotate(-90deg);
    }
    .circle-bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.12);
    }
    .circle-fg {
      fill: none;
      stroke-linecap: round;
      will-change: stroke-dashoffset;
    }
    .circle-pct {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      color: #f6ecd9;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>

  <div class="hf-center progress-wrap" id="progressWrap"
       data-composition-id="progress-indicator"
       data-start="0"
       data-duration="3"
       data-track-index="0">
    <!-- Content injected by JS based on style prop -->
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    /* ── Props ────────────────────────────────────────────────────── */
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const totalSteps   = Math.max(1, Math.round(v.steps    ?? 4));
    const currentStep  = Math.max(1, Math.min(totalSteps, Math.round(v.currentStep ?? 2)));
    const color        = v.color       ?? '#9f75ff';
    const fontSize     = v.fontSize    ?? 16;
    const style        = v.style       ?? 'dots';
    const yPos         = v.yPos        ?? 85;

    const wrap = document.getElementById('progressWrap');
    wrap.style.top = yPos + '%';

    /* ── GSAP Timeline ───────────────────────────────────────────── */
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    // Entrance
    tl.fromTo(wrap, { opacity: 0 }, { opacity: 1, duration: 0.3 }, 0);

    switch (style) {
      case 'dots':
        buildDots();
        break;
      case 'bar':
        buildBar();
        break;
      case 'circle':
        buildCircle();
        break;
      default:
        buildDots();
    }

    /* ── Exit ── */
    const dur = parseFloat(v.timingDuration ?? 3);
    const exitStart = Math.max(dur - 0.4, 0.6);
    tl.to(wrap, { opacity: 0, duration: 0.3, ease: 'power2.in' }, exitStart);

    /* ──────────────────────────────────────────────────────────────── */
    /*  DOTS                                                           */
    /* ──────────────────────────────────────────────────────────────── */
    function buildDots() {
      wrap.classList.add('dots');
      wrap.style.flexWrap = 'wrap';
      wrap.style.justifyContent = 'center';

      for (let i = 1; i <= totalSteps; i++) {
        const dot = document.createElement('div');
        dot.className = 'dot';
        if (i <= currentStep) dot.classList.add('filled');
        dot.textContent = String(i);
        dot.style.borderColor = i <= currentStep ? color : 'rgba(255,255,255,0.25)';
        dot.style.background = i <= currentStep ? color : 'transparent';
        wrap.appendChild(dot);

        // Stagger in each dot
        tl.fromTo(dot,
          { scale: 0, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.25, ease: 'back.out(2)' },
          0.15 + i * 0.08
        );
      }
    }

    /* ──────────────────────────────────────────────────────────────── */
    /*  BAR                                                            */
    /* ──────────────────────────────────────────────────────────────── */
    function buildBar() {
      const barW = Math.round(1080 * 0.65);
      wrap.style.width = barW + 'px';
      wrap.style.height = '40px';
      wrap.style.position = 'relative';

      const outer = document.createElement('div');
      outer.className = 'bar-outer';
      outer.style.width = '100%';
      outer.style.position = 'absolute';
      outer.style.top = '50%';
      outer.style.transform = 'translateY(-50%)';

      const inner = document.createElement('div');
      inner.className = 'bar-inner';
      inner.style.width = '0%';
      inner.style.background = color;

      const head = document.createElement('div');
      head.className = 'bar-head';
      head.style.background = color;

      const label = document.createElement('div');
      label.className = 'bar-text';
      label.style.fontSize = fontSize + 'px';

      inner.appendChild(head);
      outer.appendChild(inner);
      wrap.appendChild(outer);
      wrap.appendChild(label);

      const pct = currentStep / totalSteps;

      // Animate fill
      tl.to(inner,
        { width: (pct * 100) + '%', duration: 1.0, ease: 'power2.inOut' },
        0.2
      );

      // Step label counts up
      const counter = { val: 0 };
      tl.to(counter,
        {
          val: currentStep,
          duration: 1.0,
          ease: 'power2.inOut',
          onUpdate() {
            label.textContent = Math.round(counter.val) + ' / ' + totalSteps;
          }
        },
        0.2
      );
      // Set initial label
      label.textContent = '0 / ' + totalSteps;
    }

    /* ──────────────────────────────────────────────────────────────── */
    /*  CIRCLE                                                         */
    /* ──────────────────────────────────────────────────────────────── */
    function buildCircle() {
      const size = 120;
      const strokeWidth = 8;
      const radius = (size - strokeWidth) / 2;
      const circumference = 2 * Math.PI * radius;
      const pct = currentStep / totalSteps;

      wrap.classList.add('circle-wrap');
      wrap.style.width = size + 'px';
      wrap.style.height = size + 'px';

      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('class', 'circle-svg');
      svg.setAttribute('width', String(size));
      svg.setAttribute('height', String(size));
      svg.setAttribute('viewBox', '0 0 ' + size + ' ' + size);

      const bgCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      bgCircle.setAttribute('class', 'circle-bg');
      bgCircle.setAttribute('cx', String(size / 2));
      bgCircle.setAttribute('cy', String(size / 2));
      bgCircle.setAttribute('r', String(radius));
      bgCircle.setAttribute('stroke-width', String(strokeWidth));

      const fgCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      fgCircle.setAttribute('class', 'circle-fg');
      fgCircle.setAttribute('cx', String(size / 2));
      fgCircle.setAttribute('cy', String(size / 2));
      fgCircle.setAttribute('r', String(radius));
      fgCircle.setAttribute('stroke-width', String(strokeWidth));
      fgCircle.setAttribute('stroke', color);
      fgCircle.setAttribute('stroke-dasharray', String(circumference));
      fgCircle.setAttribute('stroke-dashoffset', String(circumference));

      svg.appendChild(bgCircle);
      svg.appendChild(fgCircle);
      wrap.appendChild(svg);

      // Percentage text
      const pctText = document.createElement('div');
      pctText.className = 'circle-pct';
      pctText.style.fontSize = Math.round(size * 0.24) + 'px';
      wrap.appendChild(pctText);

      // Animate fill
      tl.to(fgCircle,
        {
          attr: { 'stroke-dashoffset': circumference * (1 - pct) },
          duration: 1.0,
          ease: 'power2.inOut'
        },
        0.2
      );

      // Animate percentage number
      const counter = { val: 0 };
      tl.to(counter,
        {
          val: Math.round(pct * 100),
          duration: 1.0,
          ease: 'power2.inOut',
          onUpdate() {
            pctText.textContent = Math.round(counter.val) + '%';
          }
        },
        0.2
      );
      pctText.textContent = '0%';
    }
  </script>
</body>
</html>
