<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Numbered Step</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .step { width: min(820px, 78vw); display: flex; align-items: flex-start; gap: 20px; will-change: transform, opacity; }
    .step-num { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 64px; line-height: 1; flex-shrink: 0; will-change: transform, opacity; }
    .step-content { flex: 1; display: flex; flex-direction: column; gap: 6px; padding: 14px 20px; border-radius: 12px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-left: 3px solid; will-change: transform, opacity; }
    .step-title { font-size: 26px; font-weight: 700; line-height: 1.2; }
    .step-desc { font-size: 18px; line-height: 1.4; color: var(--hf-muted); }
  </style>
</head>
<body>
  <div class="hf-center step" id="step" data-composition-id="numbered-step" data-start="0" data-duration="3" data-track-index="0">
    <div class="step-num" id="num"></div>
    <div class="step-content" id="content">
      <div class="step-title hf-text-heading" id="title"></div>
      <div class="step-desc hf-text-body" id="desc"></div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const accentColor = v.accentColor ?? v.color ?? '#9f75ff';
    const yPos = v.yPos ?? 50;
    document.getElementById('step').style.top = yPos + '%';
    document.getElementById('num').textContent = v.number ?? '1';
    document.getElementById('num').style.color = accentColor;
    document.getElementById('title').textContent = v.title ?? '';
    document.getElementById('desc').textContent = v.description ?? '';
    document.getElementById('content').style.borderLeftColor = accentColor;
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo('#num', { opacity: 0, x: -16, scale: 0.8 }, { opacity: 1, x: 0, scale: 1, duration: 0.35, ease: 'back.out(1.4)' }, 0);
    tl.fromTo('#content', { opacity: 0, x: 16 }, { opacity: 1, x: 0, duration: 0.3 }, 0.08);
    tl.fromTo('#title', { opacity: 0, y: 6 }, { opacity: 1, y: 0, duration: 0.25 }, 0.15);
    tl.fromTo('#desc', { opacity: 0, y: 6 }, { opacity: 1, y: 0, duration: 0.25 }, 0.22);
    const dur = parseFloat(v.timingDuration ?? 3);
    tl.to('#step', { opacity: 0, y: -12, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.5, 0.6));
  </script>
</body>
</html>
