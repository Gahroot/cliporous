<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Voice Waveform</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .vw-w { width: min(680px, 92vw); display: flex; flex-direction: column; align-items: center; gap: 16px;
      will-change: transform, opacity; }
    .vw-svg { width: 100%; height: 100px; overflow: visible; }
    .vw-label { font-size: 22px; font-weight: 700; text-align: center; letter-spacing: 0.05em; }
    .vw-status { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--hf-muted); }
    .vw-dot { width: 8px; height: 8px; border-radius: 50%; animation: hf-blink 1s step-end infinite; }
    .vw-bars { display: flex; align-items: center; gap: 3px; height: 100px; }
    .vw-bar { width: 4px; border-radius: 2px; will-change: transform; transform-origin: bottom; }
  </style>
</head>
<body>
  <div class="hf-center vw-w" id="vwW" data-composition-id="voice-waveform" data-start="0" data-duration="3.5" data-track-index="0">
    <svg class="vw-svg" id="vwSvg" viewBox="0 0 800 100" preserveAspectRatio="none" shape-rendering="geometricPrecision">
      <path id="vwWave" fill="none" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <div class="vw-label hf-text-heading" id="vwLabel"></div>
    <div class="vw-status">
      <div class="vw-dot" id="vwDot"></div>
      <span id="vwStatusText"></span>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const accentColor = v.accentColor ?? '#9f75ff';
    const yPos = v.yPos ?? 50;
    const label = v.label ?? 'Voice Active';
    const amplitude = v.amplitude ?? 0.7;

    document.getElementById('vwW').style.top = yPos + '%';
    document.getElementById('vwLabel').textContent = label;
    document.getElementById('vwDot').style.background = accentColor;

    const wave = document.getElementById('vwWave');
    wave.style.stroke = accentColor;
    wave.style.filter = `drop-shadow(0 0 6px ${accentColor})`;

    function genWaveform(offset) {
      let d = 'M 0 50';
      for (let x = 0; x <= 800; x += 3) {
        const freq1 = Math.sin((x + offset) * 0.04) * 30 * amplitude;
        const freq2 = Math.sin((x + offset) * 0.08) * 12 * amplitude;
        const freq3 = Math.sin((x + offset) * 0.02) * 8 * amplitude;
        const y = 50 + freq1 + freq2 + freq3;
        d += ` L ${x} ${y}`;
      }
      return d;
    }

    wave.setAttribute('d', genWaveform(0));

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo('#vwW', { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.4, ease: 'back.out(1.2)' }, 0);
    tl.fromTo('#vwLabel', { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.3 }, 0.15);

    let offset = 0;
    gsap.ticker.add(() => { offset += 4; wave.setAttribute('d', genWaveform(offset)); });

    const dur = parseFloat(v.timingDuration ?? 3.5);
    tl.to('#vwW', { opacity: 0, y: -12, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.5, 0.6));
  </script>
</body>
</html>
