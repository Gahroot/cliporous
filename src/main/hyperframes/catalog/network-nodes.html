<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Network Nodes</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .net-w { width: min(800px, 78vw); height: 400px; position: relative; will-change: transform, opacity; }
    .net-svg { width: 100%; height: 100%; }
    .net-line { stroke-width: 1; opacity: 0.3; }
    .net-node { will-change: transform, opacity; }
    .net-node-dot { filter: url(#glow); }
    .net-node-label { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
      fill: var(--hf-fg); text-anchor: middle; }
    .net-title { font-size: 20px; font-weight: 700; text-align: center; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="hf-center" style="display:flex;flex-direction:column;align-items:center;" id="netW"
       data-composition-id="network-nodes" data-start="0" data-duration="3.5" data-track-index="0">
    <div class="net-w" id="netBox">
      <svg class="net-svg" id="netSvg" viewBox="0 0 800 400">
        <defs>
          <filter id="glow">
            <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
            <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
      </svg>
    </div>
    <div class="net-title hf-text-heading" id="title"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const accentColor = v.accentColor ?? '#9f75ff';
    const yPos = v.yPos ?? 50;
    const title = v.title ?? 'Connected & Integrated';

    const nodes = v.nodes ?? [
      { x: 400, y: 80, icon: '🤖', label: 'AI Agent', main: true },
      { x: 150, y: 200, icon: '📊', label: 'CRM' },
      { x: 650, y: 200, icon: '📧', label: 'Email' },
      { x: 200, y: 340, icon: '💬', label: 'SMS' },
      { x: 400, y: 320, icon: '📞', label: 'Calls' },
      { x: 600, y: 340, icon: '🌐', label: 'Web' }
    ];

    // Edges from main node to others
    const edges = v.edges ?? nodes.slice(1).map((_, i) => [0, i + 1]);

    document.getElementById('netW').style.top = yPos + '%';
    document.getElementById('title').textContent = title;

    const svg = document.getElementById('netSvg');

    // Draw edges
    for (const [from, to] of edges) {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', nodes[from].x); line.setAttribute('y1', nodes[from].y);
      line.setAttribute('x2', nodes[to].x); line.setAttribute('y2', nodes[to].y);
      line.setAttribute('stroke', accentColor); line.classList.add('net-line');
      svg.appendChild(line);
    }

    // Draw nodes
    for (let i = 0; i < nodes.length; i++) {
      const n = nodes[i];
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.classList.add('net-node');
      g.setAttribute('transform', `translate(${n.x}, ${n.y})`);

      const r = n.main ? 32 : 22;
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('r', r);
      circle.setAttribute('fill', n.main ? accentColor : accentColor + '33');
      circle.setAttribute('stroke', accentColor);
      circle.setAttribute('stroke-width', n.main ? 2 : 1);
      circle.classList.add('net-node-dot');
      g.appendChild(circle);

      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('y', r + 18);
      text.classList.add('net-node-label');
      text.textContent = n.label;
      g.appendChild(text);

      svg.appendChild(g);
    }

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo('#netW', { opacity: 0, scale: 0.9 }, { opacity: 1, scale: 1, duration: 0.4, ease: 'back.out(1.2)' }, 0);
    tl.fromTo('.net-line', { opacity: 0 }, { opacity: 0.3, duration: 0.3, stagger: 0.05 }, 0.1);
    tl.fromTo('.net-node', { opacity: 0, scale: 0 }, { opacity: 1, scale: 1, duration: 0.3, stagger: 0.06, ease: 'back.out(1.5)' }, 0.15);
    tl.fromTo('#title', { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.25 }, 0.4);

    // Pulse on main node
    gsap.to('.net-node:first-child circle', { scale: 1.1, duration: 1.2, yoyo: true, repeat: -1, ease: 'sine.inOut', transformOrigin: 'center center' });

    const dur = parseFloat(v.timingDuration ?? 3.5);
    tl.to('#netW', { opacity: 0, y: -12, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.5, 0.6));
  </script>
</body>
</html>
