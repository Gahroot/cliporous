<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Progress Ring</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .ring-w { display: flex; flex-direction: column; align-items: center; gap: 16px; will-change: transform, opacity; }
    .ring-svg { transform: rotate(-90deg); }
    .ring-track { fill: none; stroke: rgba(255,255,255,0.08); }
    .ring-fill { fill: none; stroke-linecap: round; }
    .ring-num { position: absolute; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 44px; color: #ffffff; text-shadow: var(--hf-text-shadow); }
    .ring-label { font-size: 20px; font-weight: 500; color: var(--hf-muted); text-align: center; }
    .ring-glow { position: absolute; width: 180px; height: 180px; border-radius: 50%; filter: blur(50px); opacity: 0.2; z-index: -1; }
  </style>
</head>
<body>
  <div class="hf-center ring-w" id="rw" data-composition-id="progress-ring" data-start="0" data-duration="3" data-track-index="0">
    <div class="ring-glow" id="glow"></div>
    <div style="position:relative; display:flex; align-items:center; justify-content:center;">
      <svg class="ring-svg" id="svg" width="180" height="180" viewBox="0 0 180 180">
        <circle class="ring-track" cx="90" cy="90" r="75" stroke-width="10"/>
        <circle class="ring-fill" id="fill" cx="90" cy="90" r="75" stroke-width="10"/>
      </svg>
      <div class="ring-num" id="num"></div>
    </div>
    <div class="ring-label hf-text-body" id="label"></div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const percent = v.percent ?? 90;
    const accentColor = v.accentColor ?? v.color ?? '#4ade80';
    const yPos = v.yPos ?? 50;
    document.getElementById('rw').style.top = yPos + '%';
    document.getElementById('glow').style.background = accentColor;
    document.getElementById('fill').style.stroke = accentColor;
    const fillEl = document.getElementById('fill');
    const r = parseFloat(fillEl.getAttribute('r'));
    const circ = 2 * Math.PI * r;
    fillEl.style.strokeDasharray = circ; fillEl.style.strokeDashoffset = circ;
    document.getElementById('num').textContent = Math.round(percent) + '%';
    document.getElementById('label').textContent = v.label ?? 'Automated';
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo('#glow', { opacity: 0, scale: 0.5 }, { opacity: 0.2, scale: 1, duration: 0.5 }, 0);
    tl.fromTo('#rw', { opacity: 0, scale: 0.9 }, { opacity: 1, scale: 1, duration: 0.4, ease: 'back.out(1.2)' }, 0.1);
    tl.to(fillEl, { strokeDashoffset: circ * (1 - percent / 100), duration: 0.7, ease: 'power2.out' }, 0.2);
    tl.fromTo('#num', { opacity: 0, scale: 0.8 }, { opacity: 1, scale: 1, duration: 0.3 }, 0.3);
    tl.fromTo('#label', { opacity: 0, y: 6 }, { opacity: 1, y: 0, duration: 0.25 }, 0.35);
    const dur = parseFloat(v.timingDuration ?? 3);
    tl.to('#rw', { opacity: 0, scale: 0.9, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.5, 0.6));
  </script>
</body>
</html>
