<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Delos Biometric</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .db-w { width: min(560px, 85vw); display: flex; flex-direction: column; gap: 20px;
      will-change: transform, opacity; }
    .db-panel { background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 28px; backdrop-filter: blur(16px); position: relative; overflow: hidden; }
    .db-scan { position: absolute; left: 0; right: 0; height: 2px; opacity: 0.3; }
    .db-fingerprint { display: flex; justify-content: center; margin-bottom: 20px; }
    .db-fp-svg { width: 140px; height: 140px; }
    .db-identity { text-align: center; font-size: 14px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--hf-muted); margin-bottom: 16px; }
    .db-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .db-stat { text-align: center; }
    .db-stat-value { font-size: 28px; font-weight: 700; font-family: 'Geist Mono', monospace; }
    .db-stat-label { font-size: 12px; color: var(--hf-muted); font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; margin-top: 4px; }
    .db-pulse-svg { width: 100%; height: 40px; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="hf-center db-w" id="dbW" data-composition-id="delos-biometric" data-start="0" data-duration="3.5" data-track-index="0">
    <div class="db-panel">
      <div class="db-scan" id="dbScan"></div>
      <div class="db-fingerprint">
        <svg class="db-fp-svg" viewBox="0 0 140 140" id="dbFp">
          <g id="dbFpLines"></g>
          <circle cx="70" cy="70" r="68" fill="none" stroke-width="1" opacity="0.2"/>
        </svg>
      </div>
      <div class="db-identity hf-text-label" id="dbIdentity">VERIFYING...</div>
      <div class="db-stats">
        <div class="db-stat">
          <div class="db-stat-value" id="dbPulse" style="color: var(--hf-rose)">--</div>
          <div class="db-stat-label">BPM</div>
        </div>
        <div class="db-stat">
          <div class="db-stat-value" id="dbStress" style="color: var(--hf-amber)">--</div>
          <div class="db-stat-label">STRESS</div>
        </div>
      </div>
      <svg class="db-pulse-svg" id="dbPulseSvg" viewBox="0 0 500 40" preserveAspectRatio="none">
        <path id="dbPulsePath" fill="none" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const accentColor = v.accentColor ?? '#9f75ff';
    const yPos = v.yPos ?? 50;
    const identity = v.identity ?? 'Unknown';
    const pulse = v.pulse ?? 72;
    const stressLevel = v.stressLevel ?? 24;

    document.getElementById('dbW').style.top = yPos + '%';
    document.getElementById('dbScan').style.background = `linear-gradient(90deg, transparent, ${accentColor}, transparent)`;

    // Fingerprint lines
    const fpLines = document.getElementById('dbFpLines');
    for (let i = 0; i < 8; i++) {
      const r = 15 + i * 7;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
      path.setAttribute('cx', '70'); path.setAttribute('cy', '78');
      path.setAttribute('rx', r); path.setAttribute('ry', r * 0.9);
      path.setAttribute('fill', 'none'); path.setAttribute('stroke', accentColor);
      path.setAttribute('stroke-width', '1.2'); path.setAttribute('opacity', '0');
      fpLines.appendChild(path);
    }

    // Pulse wave
    function genPulse(offset) {
      let d = 'M 0 20';
      for (let x = 0; x <= 500; x += 2) {
        const phase = (x + offset) % 120;
        let y = 20;
        if (phase > 40 && phase < 50) y = 20 - (phase - 40) * 1.5;
        else if (phase >= 50 && phase < 55) y = 5 + (phase - 50) * 3;
        else if (phase >= 55 && phase < 65) y = 20 - (65 - phase) * 1.5;
        d += ` L ${x} ${y}`;
      }
      return d;
    }
    const pulsePath = document.getElementById('dbPulsePath');
    pulsePath.style.stroke = '#fb7185';
    pulsePath.setAttribute('d', genPulse(0));

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo('#dbW', { opacity: 0, scale: 0.92 }, { opacity: 1, scale: 1, duration: 0.4, ease: 'back.out(1.2)' }, 0);

    // Animate fingerprint reveal
    const fpEllipses = fpLines.querySelectorAll('ellipse');
    tl.to(Array.from(fpEllipses), {
      opacity: 0.5, duration: 0.15, stagger: 0.06, ease: 'power2.out'
    }, 0.15);

    // Animate identity text
    tl.call(() => { document.getElementById('dbIdentity').textContent = identity.toUpperCase(); }, null, 0.5);

    // Animate numbers
    tl.fromTo('#dbPulse', { opacity: 0 }, { opacity: 1, duration: 0.3 }, 0.4);
    tl.call(() => { document.getElementById('dbPulse').textContent = pulse; }, null, 0.5);
    tl.fromTo('#dbStress', { opacity: 0 }, { opacity: 1, duration: 0.3 }, 0.45);
    tl.call(() => { document.getElementById('dbStress').textContent = stressLevel + '%'; }, null, 0.55);

    gsap.to('#dbScan', { top: '100%', duration: 2.5, repeat: -1, ease: 'none' });
    let pulseOffset = 0;
    gsap.ticker.add(() => { pulseOffset += 3; pulsePath.setAttribute('d', genPulse(pulseOffset)); });

    const dur = parseFloat(v.timingDuration ?? 3.5);
    tl.to('#dbW', { opacity: 0, scale: 0.92, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.5, 0.6));
  </script>
</body>
</html>
