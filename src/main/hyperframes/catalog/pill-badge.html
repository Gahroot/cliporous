<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Pill Badge</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .pill {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 30px; border-radius: 100px;
      background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.12);
      will-change: transform, opacity;
    }
    .pill-icon { font-size: 18px; line-height: 1; }
    .pill-text { font-size: 16px; font-weight: 700; letter-spacing: 0.1em; }
    .pill-glow { position: absolute; inset: -16px; border-radius: 100px; z-index: -1; filter: blur(24px); opacity: 0; will-change: opacity; }
  </style>
</head>
<body>
  <div class="hf-center pill" id="pill" data-composition-id="pill-badge" data-start="0" data-duration="2.5" data-track-index="0">
    <div class="pill-glow" id="glow"></div>
    <span class="pill-icon" id="icon"></span>
    <span class="pill-text hf-text-body" id="text"></span>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const accentColor = v.accentColor ?? v.color ?? '#4ade80';
    const yPos = v.yPos ?? 50;
    document.getElementById('pill').style.top = yPos + '%';
    document.getElementById('icon').textContent = v.icon ?? '⚡';
    const textEl = document.getElementById('text');
    textEl.textContent = v.text ?? v.title ?? 'AUTOMATED';
    textEl.style.color = accentColor;
    document.getElementById('glow').style.background = accentColor;
    const glowEl = document.getElementById('glow');
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo('#pill', { opacity: 0, scale: 0.9 }, { opacity: 1, scale: 1, duration: 0.35, ease: 'back.out(1.2)' }, 0);
    if (v.glow !== false) { tl.to(glowEl, { opacity: 0.4, duration: 0.3 }, 0.1); tl.to(glowEl, { opacity: 0.6, duration: 0.8, yoyo: true, repeat: -1, ease: 'sine.inOut' }, 0.4); }
    const dur = parseFloat(v.timingDuration ?? 2.5);
    tl.to('#pill', { opacity: 0, scale: 0.85, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.4, 0.5));
  </script>
</body>
</html>
