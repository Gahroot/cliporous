<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Icon Grid</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .igw { width: min(860px, 84vw); will-change: transform, opacity; }
    .ig { display: grid; gap: 14px; }
    .ig-2 { grid-template-columns: 1fr 1fr; }
    .ig-3 { grid-template-columns: 1fr 1fr 1fr; }
    .ig-cell { display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 20px 12px; border-radius: 12px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      will-change: transform, opacity; }
    .ig-cell-icon { font-size: 32px; line-height: 1; }
    .ig-cell-label { font-size: 16px; font-weight: 500; text-align: center; color: var(--hf-muted); }
  </style>
</head>
<body>
  <div class="hf-center igw" id="igw" data-composition-id="icon-grid" data-start="0" data-duration="3.5" data-track-index="0">
    <div class="ig" id="ig"></div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const cols = v.columns ?? 2;
    const items = v.items ?? [{icon:'📞',label:'Sales'},{icon:'📧',label:'Marketing'},{icon:'🎧',label:'Support'},{icon:'💰',label:'Billing'}];
    const yPos = v.yPos ?? 50;
    document.getElementById('igw').style.top = yPos + '%';
    const igEl = document.getElementById('ig'); igEl.className = `ig ig-${cols}`;
    const cellEls = [];
    for (const item of items) {
      const cell = document.createElement('div'); cell.className = 'ig-cell';
      const icon = document.createElement('div'); icon.className = 'ig-cell-icon'; icon.textContent = item.icon;
      const label = document.createElement('div'); label.className = 'ig-cell-label hf-text-body'; label.textContent = item.label;
      cell.appendChild(icon); cell.appendChild(label); igEl.appendChild(cell); cellEls.push(cell);
    }
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo('#igw', { opacity: 0, y: 20, scale: 0.95 }, { opacity: 1, y: 0, scale: 1, duration: 0.4, ease: 'back.out(1.2)' }, 0);
    for (let i = 0; i < cellEls.length; i++) tl.fromTo(cellEls[i], { opacity: 0, y: 12, scale: 0.9 }, { opacity: 1, y: 0, scale: 1, duration: 0.25, ease: 'back.out(1.2)' }, 0.1 + i * 0.05);
    const dur = parseFloat(v.timingDuration ?? 3.5);
    tl.to('#igw', { opacity: 0, y: -12, scale: 0.96, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.5, 0.6));
  </script>
</body>
</html>
