<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Glass Card</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .card {
      width: min(820px, 78vw);
      text-align: center;
      will-change: transform, opacity;
      gap: 16px;
      padding: 36px 40px;
    }
    .card-icon-wrap {
      width: 72px; height: 72px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.18);
      margin-bottom: 4px;
      will-change: transform, opacity;
    }
    .card-icon-wrap .icon-emoji { font-size: 36px; line-height: 1; }
    .card-title { font-size: 38px; line-height: 1.15; will-change: transform, opacity; }
    .card-subtitle { font-size: 20px; line-height: 1.4; will-change: transform, opacity; color: var(--hf-muted); }
    .card-bar { width: 48px; height: 3px; border-radius: 2px; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="hf-center hf-card card hf-hud-corners" id="card"
       data-composition-id="glass-card" data-start="0" data-duration="3" data-track-index="0">
    <div class="card-icon-wrap" id="iconWrap">
      <span class="icon-emoji" id="icon"></span>
    </div>
    <div class="card-title hf-text-heading" id="title"></div>
    <div class="card-bar" id="bar"></div>
    <div class="card-subtitle hf-text-body" id="subtitle"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const icon = v.icon ?? '🤖';
    const title = v.title ?? v.text ?? 'AI Sales Agent';
    const subtitle = v.subtitle ?? 'Handles calls 24/7';
    const accentColor = v.accentColor ?? v.color ?? '#60a5fa';
    const yPos = v.yPos ?? 35;

    const card = document.getElementById('card');
    const iconEl = document.getElementById('icon');
    const titleEl = document.getElementById('title');
    const subtitleEl = document.getElementById('subtitle');
    const bar = document.getElementById('bar');
    const iconWrap = document.getElementById('iconWrap');

    card.style.top = yPos + '%';
    iconEl.textContent = icon;
    titleEl.textContent = title;
    bar.style.background = accentColor;
    iconWrap.style.borderColor = accentColor + '44';

    if (subtitle) { subtitleEl.textContent = subtitle; } else { subtitleEl.style.display = 'none'; }

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo(card, { opacity: 0, y: 30, scale: 0.95 }, { opacity: 1, y: 0, scale: 1, duration: 0.4, ease: 'back.out(1.2)' }, 0);
    tl.fromTo(iconWrap, { opacity: 0, scale: 0 }, { opacity: 1, scale: 1, duration: 0.4, ease: 'elastic.out(1, 0.5)' }, 0.1);
    tl.fromTo(titleEl, { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.3 }, 0.2);
    tl.fromTo(bar, { scaleX: 0 }, { scaleX: 1, duration: 0.25 }, 0.28);
    if (subtitle) { tl.fromTo(subtitleEl, { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.3 }, 0.32); }

    const dur = parseFloat(v.timingDuration ?? 3);
    tl.to(card, { opacity: 0, y: -16, scale: 0.96, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.5, 0.6));
  </script>
</body>
</html>
