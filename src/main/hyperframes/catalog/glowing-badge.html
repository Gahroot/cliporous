<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; overflow: hidden; width: 1080px; height: 1920px; }
  .badge {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', -apple-system, sans-serif;
    font-weight: 700;
    color: #fff;
    opacity: 0;
    z-index: 1;
  }
  .badge.visible {
    animation: badgeIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  .badge.exiting {
    animation: badgeOut 0.3s ease-in forwards;
  }
  .glow {
    position: absolute;
    border-radius: inherit;
    z-index: -1;
    filter: blur(var(--glow-blur, 12px));
    animation: glowPulse 2s ease-in-out infinite;
  }
  @keyframes badgeIn {
    0% { opacity: 0; transform: scale(0.5); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes badgeOut {
    0% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.8); }
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.08); }
  }
</style>
</head>
<body>
  <div class="badge" id="badge">
    <div class="glow" id="glow"></div>
    <span id="text" style="position:relative; z-index:1;"></span>
  </div>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const badge = document.getElementById('badge');
    const glow = document.getElementById('glow');
    const textEl = document.getElementById('text');

    const text = v.text ?? 'NEW';
    const color = v.color ?? '#9f75ff';
    const fontSize = v.fontSize ?? 24;
    const glowIntensity = Math.max(1, Math.min(10, v.glowIntensity ?? 5));
    const shape = v.shape ?? 'pill';
    const xPos = v.xPos ?? 50;
    const yPos = v.yPos ?? 15;

    textEl.textContent = text;
    textEl.style.fontSize = fontSize + 'px';
    textEl.style.letterSpacing = '2px';
    textEl.style.textTransform = 'uppercase';
    textEl.style.padding = shape === 'circle' ? '0' : '10px 24px';
    textEl.style.borderRadius = shape === 'circle' ? '50%' : '999px';
    textEl.style.background = color;
    textEl.style.minWidth = shape === 'circle' ? (fontSize * 2.2) + 'px' : 'auto';
    textEl.style.minHeight = shape === 'circle' ? (fontSize * 2.2) + 'px' : 'auto';
    textEl.style.display = 'flex';
    textEl.style.alignItems = 'center';
    textEl.style.justifyContent = 'center';
    textEl.style.textAlign = 'center';

    badge.style.left = xPos + '%';
    badge.style.top = yPos + '%';
    badge.style.transform = 'translate(-50%, -50%)';
    badge.style.width = shape === 'circle' ? (fontSize * 2.2) + 'px' : 'auto';
    badge.style.height = shape === 'circle' ? (fontSize * 2.2) + 'px' : 'auto';

    // Glow element
    glow.style.width = '120%';
    glow.style.height = '120%';
    glow.style.background = color;
    glow.style.top = '-10%';
    glow.style.left = '-10%';
    glow.style.setProperty('--glow-blur', (glowIntensity * 2) + 'px');
    glow.style.opacity = (glowIntensity / 10);

    badge.classList.add('visible');
  </script>
</body>
</html>
