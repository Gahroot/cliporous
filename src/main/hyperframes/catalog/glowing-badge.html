<!DOCTYPE html>
<html data-width="1080" data-height="1920">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Glowing Badge</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .badge-anchor {
      position: absolute;
      z-index: 1;
      will-change: transform, opacity;
    }
    .badge-glow {
      position: absolute;
      border-radius: inherit;
      z-index: -1;
      pointer-events: none;
      will-change: opacity;
    }
    .badge-body {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      font-weight: 700;
      color: #fff;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
      white-space: nowrap;
      will-change: transform;
    }
  </style>
</head>
<body>

  <div class="badge-anchor" id="badge"
       data-composition-id="glowing-badge"
       data-start="0"
       data-duration="3"
       data-track-index="0">
    <div class="badge-glow" id="glow"></div>
    <div class="badge-body" id="body"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    /* ── Props ────────────────────────────────────────────────────── */
    const v            = window.__hyperframes?.getVariables?.() ?? {};
    const text         = v.text          ?? 'NEW';
    const color        = v.color         ?? '#9f75ff';
    const fontSize     = v.fontSize      ?? 22;
    const glowIntensity = Math.max(1, Math.min(10, v.glowIntensity ?? 5));
    const shape        = v.shape         ?? 'pill';
    const yPos         = v.yPos          ?? 12;

    /* ── Apply props ──────────────────────────────────────────────── */
    const badge = document.getElementById('badge');
    const glow  = document.getElementById('glow');
    const body  = document.getElementById('body');

    const isCircle = shape === 'circle';

    body.textContent = text;
    body.style.fontSize = fontSize + 'px';

    if (isCircle) {
      const d = Math.round(fontSize * 2.4);
      body.style.width = d + 'px';
      body.style.height = d + 'px';
      body.style.borderRadius = '50%';
      body.style.padding = '0';
    } else {
      body.style.borderRadius = '999px';
      body.style.padding = Math.round(fontSize * 0.45) + 'px ' + Math.round(fontSize * 1.1) + 'px';
    }

    body.style.background = color;

    // Glow layer
    const blurPx = glowIntensity * 3;
    glow.style.inset = '-' + Math.round(blurPx * 0.8) + 'px';
    glow.style.background = color;
    glow.style.filter = 'blur(' + blurPx + 'px)';
    glow.style.borderRadius = body.style.borderRadius;

    // Position
    badge.style.left = (v.xPos ?? 50) + '%';
    badge.style.top = yPos + '%';
    badge.style.transform = 'translate(-50%, -50%)';

    /* ── GSAP Timeline ───────────────────────────────────────────── */
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    // Badge bounces in
    tl.fromTo(badge,
      { opacity: 0, scale: 0.3 },
      { opacity: 1, scale: 1, duration: 0.45, ease: 'back.out(2)' },
      0
    );

    // Glow fades in
    tl.fromTo(glow,
      { opacity: 0 },
      { opacity: glowIntensity / 10, duration: 0.4 },
      0.1
    );

    // Continuous glow pulse (repeating)
    tl.to(glow,
      {
        opacity: Math.min(1, glowIntensity / 10 + 0.25),
        duration: 0.7,
        yoyo: true,
        repeat: -1,
        ease: 'sine.inOut'
      },
      0.6
    );

    // Subtle scale breathing
    tl.to(body,
      { scale: 1.03, duration: 0.9, yoyo: true, repeat: -1, ease: 'sine.inOut' },
      0.5
    );

    // ── Exit ──
    const dur = parseFloat(v.timingDuration ?? 3);
    const exitStart = Math.max(dur - 0.45, 0.6);

    tl.to(badge,
      { opacity: 0, scale: 0.5, duration: 0.35, ease: 'power2.in' },
      exitStart
    );
  </script>
</body>
</html>
