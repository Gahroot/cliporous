<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Hologram Orb</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .ho-w { display: flex; flex-direction: column; align-items: center; gap: 20px;
      will-change: transform, opacity; }
    .ho-scene { position: relative; width: 220px; height: 220px;
      perspective: 600px; }
    .ho-orb { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 120px; height: 120px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; transform-style: preserve-3d; }
    .ho-orb-inner { font-size: 44px; filter: drop-shadow(0 0 12px var(--accent)); }
    .ho-ring { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      border-radius: 50%; border: 1.5px solid; will-change: transform; }
    .ho-particles { position: absolute; inset: 0; }
    .ho-particle { position: absolute; width: 3px; height: 3px; border-radius: 50%;
      will-change: transform, opacity; }
    .ho-label { font-size: 22px; font-weight: 700; text-align: center; }
    .ho-ambient { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 260px; height: 260px; border-radius: 50%; filter: blur(60px); opacity: 0.2; z-index: -1; }
  </style>
</head>
<body>
  <div class="hf-center ho-w" id="hoW" data-composition-id="hologram-orb" data-start="0" data-duration="3.5" data-track-index="0">
    <div class="ho-scene">
      <div class="ho-ambient" id="hoAmbient"></div>
      <div class="ho-ring" id="hoR1" style="width:180px;height:180px;"></div>
      <div class="ho-ring" id="hoR2" style="width:150px;height:150px;"></div>
      <div class="ho-ring" id="hoR3" style="width:110px;height:110px;"></div>
      <div class="ho-orb" id="hoOrb">
        <span class="ho-orb-inner" id="hoIcon"></span>
      </div>
      <div class="ho-particles" id="hoParticles"></div>
    </div>
    <div class="ho-label hf-text-heading" id="hoLabel"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const accentColor = v.accentColor ?? '#9f75ff';
    const yPos = v.yPos ?? 50;
    const icon = v.icon ?? '🔮';
    const label = v.label ?? 'Hologram';

    document.getElementById('hoW').style.top = yPos + '%';
    document.getElementById('hoIcon').textContent = icon;
    document.getElementById('hoLabel').textContent = label;
    document.getElementById('hoAmbient').style.background = accentColor;

    const orb = document.getElementById('hoOrb');
    orb.style.background = `radial-gradient(circle, ${accentColor}66, ${accentColor}22)`;
    orb.style.border = `1.5px solid ${accentColor}88`;
    orb.style.boxShadow = `0 0 30px ${accentColor}44, inset 0 0 20px ${accentColor}22`;

    const rings = [
      { el: document.getElementById('hoR1'), opacity: 0.4 },
      { el: document.getElementById('hoR2'), opacity: 0.3 },
      { el: document.getElementById('hoR3'), opacity: 0.5 }
    ];
    rings.forEach(r => {
      r.el.style.borderColor = accentColor;
      r.el.style.opacity = r.opacity;
      r.el.style.boxShadow = `0 0 8px ${accentColor}33`;
    });

    // Floating particles
    const particles = document.getElementById('hoParticles');
    for (let i = 0; i < 12; i++) {
      const p = document.createElement('div');
      p.className = 'ho-particle';
      p.style.background = accentColor;
      p.style.left = 30 + Math.random() * 160 + 'px';
      p.style.top = 30 + Math.random() * 160 + 'px';
      p.style.opacity = '0';
      particles.appendChild(p);
    }

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo('#hoW', { opacity: 0, scale: 0.85 }, { opacity: 1, scale: 1, duration: 0.5, ease: 'back.out(1.3)' }, 0);
    rings.forEach((r, i) => {
      tl.fromTo(r.el, { opacity: 0, scale: 0.5 }, { opacity: r.opacity, scale: 1, duration: 0.3, ease: 'back.out(1.2)' }, 0.1 + i * 0.08);
    });
    tl.fromTo('#hoOrb', { opacity: 0, scale: 0 }, { opacity: 1, scale: 1, duration: 0.4, ease: 'elastic.out(1, 0.5)' }, 0.2);
    tl.fromTo('#hoLabel', { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.3 }, 0.4);

    gsap.to('#hoR1', { rotation: 360, duration: 8, repeat: -1, ease: 'none', transformOrigin: 'center center' });
    gsap.to('#hoR2', { rotation: -360, duration: 11, repeat: -1, ease: 'none', transformOrigin: 'center center' });
    gsap.to('#hoR3', { rotation: 360, duration: 6, repeat: -1, ease: 'none', transformOrigin: 'center center' });
    gsap.to('#hoOrb', { scale: 1.08, duration: 2, yoyo: true, repeat: -1, ease: 'sine.inOut' });
    gsap.to('#hoAmbient', { opacity: 0.3, duration: 2.5, yoyo: true, repeat: -1, ease: 'sine.inOut' });
    gsap.to('.ho-particle', { opacity: 0.6, y: -20, duration: 1.5, yoyo: true, repeat: -1, stagger: { each: 0.15, from: 'random' }, ease: 'sine.inOut' });

    const dur = parseFloat(v.timingDuration ?? 3.5);
    tl.to('#hoW', { opacity: 0, scale: 0.9, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.5, 0.6));
  </script>
</body>
</html>
