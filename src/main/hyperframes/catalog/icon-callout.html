<!DOCTYPE html>
<html data-width="1080" data-height="1920">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Icon Callout</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .callout {
      display: flex;
      align-items: center;
      gap: 20px;
      will-change: transform, opacity;
    }
    .icon-ring {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      will-change: transform, opacity;
    }
    .icon-ring svg {
      width: 55%;
      height: 55%;
      stroke: #fff;
      stroke-width: 2;
      fill: none;
    }
    .icon-ring-glow {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      z-index: -1;
      filter: blur(18px);
      opacity: 0;
      will-change: opacity;
    }
    .callout-label {
      font-weight: 600;
      white-space: nowrap;
      will-change: transform, opacity;
    }
  </style>
</head>
<body>

  <div class="hf-center callout" id="callout"
       data-composition-id="icon-callout"
       data-start="0"
       data-duration="3"
       data-track-index="0">
    <div style="position:relative;">
      <div class="icon-ring-glow" id="ringGlow"></div>
      <div class="icon-ring" id="ring"></div>
    </div>
    <div class="callout-label hf-text" id="label"></div>
  </div>

  <!-- Lucide icons via CDN (subset — users pass icon name as prop) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    /* ── Props ────────────────────────────────────────────────────── */
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const text      = v.text      ?? 'Lightning Fast';
    const color     = v.color     ?? '#9f75ff';
    const fontSize  = v.fontSize  ?? 30;
    const iconName  = v.icon      ?? 'zap';
    const iconSize  = v.iconSize  ?? 80;
    const yPos      = v.yPos      ?? 50;

    /* ── Apply props ──────────────────────────────────────────────── */
    const callout  = document.getElementById('callout');
    const ring     = document.getElementById('ring');
    const ringGlow = document.getElementById('ringGlow');
    const labelEl  = document.getElementById('label');

    callout.style.top = yPos + '%';

    ring.style.width  = iconSize + 'px';
    ring.style.height = iconSize + 'px';
    ring.style.background = color;

    labelEl.textContent = text;
    labelEl.style.fontSize = fontSize + 'px';
    labelEl.style.color = '#f6ecd9';

    // Render Lucide icon into the ring
    try {
      const svgStr = lucide.icons[iconName]?.toSvg({
        width: Math.round(iconSize * 0.5),
        height: Math.round(iconSize * 0.5),
        color: '#ffffff',
        'stroke-width': 2
      });
      if (svgStr) {
        ring.innerHTML = svgStr;
      } else {
        // Fallback: text character
        ring.textContent = iconName.charAt(0).toUpperCase();
        ring.style.color = '#fff';
        ring.style.fontSize = Math.round(iconSize * 0.45) + 'px';
        ring.style.fontFamily = 'Inter, sans-serif';
        ring.style.fontWeight = '700';
      }
    } catch {
      ring.textContent = '★';
      ring.style.color = '#fff';
      ring.style.fontSize = Math.round(iconSize * 0.5) + 'px';
    }

    // Glow color matches accent
    ringGlow.style.background = color;

    /* ── GSAP Timeline ───────────────────────────────────────────── */
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    // Icon ring scales in with elastic overshoot
    tl.fromTo(ring,
      { scale: 0, opacity: 0 },
      { scale: 1, opacity: 1, duration: 0.55, ease: 'elastic.out(1, 0.45)' },
      0
    );

    // Glow fades in
    tl.to(ringGlow,
      { opacity: 0.6, duration: 0.4 },
      0.15
    );

    // Label slides in from left + fades in
    tl.fromTo(labelEl,
      { opacity: 0, x: -24 },
      { opacity: 1, x: 0, duration: 0.4, ease: 'back.out(1.2)' },
      0.25
    );

    // Glow pulse (repeating, continuous)
    tl.to(ringGlow,
      { opacity: 0.85, duration: 0.8, yoyo: true, repeat: -1, ease: 'sine.inOut' },
      0.6
    );

    // ── Exit ──
    const dur = parseFloat(v.timingDuration ?? 3);
    const exitStart = Math.max(dur - 0.5, 0.6);

    tl.to(callout,
      { opacity: 0, scale: 0.85, duration: 0.4, ease: 'power2.in' },
      exitStart
    );
  </script>
</body>
</html>
