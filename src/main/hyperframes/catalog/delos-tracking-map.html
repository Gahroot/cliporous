<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Delos Tracking Map</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .dtm-w { width: min(650px, 88vw); display: flex; flex-direction: column; gap: 12px;
      will-change: transform, opacity; }
    .dtm-panel { background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 20px; backdrop-filter: blur(16px); position: relative; overflow: hidden; }
    .dtm-label { font-size: 14px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 12px; }
    .dtm-map { position: relative; width: 100%; height: 300px; border-radius: 8px;
      background: rgba(255,255,255,0.03); overflow: hidden; }
    .dtm-grid { position: absolute; inset: 0; background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px; }
    .dtm-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .dtm-waypoint { will-change: transform, opacity; }
    .dtm-label-text { font-size: 12px; font-weight: 700; fill: #fff; text-anchor: middle;
      font-family: 'Inter', sans-serif; }
    .dtm-dot-pulse { animation: hf-pulse-glow 2s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="hf-center dtm-w" id="dtmW" data-composition-id="delos-tracking-map" data-start="0" data-duration="3.5" data-track-index="0">
    <div class="dtm-panel">
      <div class="dtm-label hf-text-heading" id="dtmLabel"></div>
      <div class="dtm-map">
        <div class="dtm-grid"></div>
        <svg class="dtm-svg" id="dtmSvg" viewBox="0 0 700 300">
          <defs>
            <filter id="dtm-glow">
              <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
              <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
        </svg>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const accentColor = v.accentColor ?? '#9f75ff';
    const yPos = v.yPos ?? 50;
    const label = v.label ?? 'Tracking Active';
    const waypoints = v.waypoints ?? [
      { x: 30, y: 40, label: 'A' },
      { x: 60, y: 25, label: 'B' },
      { x: 75, y: 60, label: 'C' }
    ];

    document.getElementById('dtmW').style.top = yPos + '%';
    document.getElementById('dtmLabel').textContent = label;

    const svg = document.getElementById('dtmSvg');

    // Draw connecting lines between sequential waypoints
    for (let i = 0; i < waypoints.length - 1; i++) {
      const a = waypoints[i], b = waypoints[i + 1];
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', a.x * 7); line.setAttribute('y1', a.y * 3);
      line.setAttribute('x2', b.x * 7); line.setAttribute('y2', b.y * 3);
      line.setAttribute('stroke', accentColor); line.setAttribute('stroke-width', '1');
      line.setAttribute('stroke-dasharray', '4 4'); line.setAttribute('opacity', '0.4');
      line.classList.add('dtm-path');
      svg.appendChild(line);
    }

    // Draw waypoints
    waypoints.forEach((wp, i) => {
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.classList.add('dtm-waypoint');
      const cx = wp.x * 7, cy = wp.y * 3;

      const outer = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      outer.setAttribute('cx', cx); outer.setAttribute('cy', cy); outer.setAttribute('r', '14');
      outer.setAttribute('fill', accentColor); outer.setAttribute('opacity', '0.15');
      outer.setAttribute('filter', 'url(#dtm-glow)');
      g.appendChild(outer);

      const inner = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      inner.setAttribute('cx', cx); inner.setAttribute('cy', cy); inner.setAttribute('r', '5');
      inner.setAttribute('fill', accentColor);
      g.appendChild(inner);

      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', cx); text.setAttribute('y', cy - 22);
      text.classList.add('dtm-label-text');
      text.textContent = wp.label;
      g.appendChild(text);

      svg.appendChild(g);
    });

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo('#dtmW', { opacity: 0, scale: 0.92 }, { opacity: 1, scale: 1, duration: 0.4, ease: 'back.out(1.2)' }, 0);
    tl.fromTo('.dtm-path', { opacity: 0 }, { opacity: 0.4, duration: 0.3, stagger: 0.1 }, 0.1);
    tl.fromTo('.dtm-waypoint', { opacity: 0, scale: 0 }, { opacity: 1, scale: 1, duration: 0.25, stagger: 0.1, ease: 'back.out(1.5)' }, 0.2);

    const dur = parseFloat(v.timingDuration ?? 3.5);
    tl.to('#dtmW', { opacity: 0, scale: 0.92, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.5, 0.6));
  </script>
</body>
</html>
