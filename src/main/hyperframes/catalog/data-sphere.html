<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Data Sphere</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .ds-w { display: flex; flex-direction: column; align-items: center; gap: 20px;
      will-change: transform, opacity; }
    .ds-scene { position: relative; width: 240px; height: 240px; }
    .ds-sphere { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 160px; height: 160px; border-radius: 50%;
      border: 1.5px solid; transform-style: preserve-3d;
      animation: hf-holo-spin 8s linear infinite; }
    .ds-dot { position: absolute; width: 4px; height: 4px; border-radius: 50%;
      will-change: transform, opacity; }
    .ds-core { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 60px; height: 60px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; z-index: 2; }
    .ds-core-icon { font-size: 28px; }
    .ds-label { font-size: 22px; font-weight: 700; text-align: center; }
    .ds-ambient { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 200px; height: 200px; border-radius: 50%; filter: blur(50px); opacity: 0.2; z-index: -1; }
  </style>
</head>
<body>
  <div class="hf-center ds-w" id="dsW" data-composition-id="data-sphere" data-start="0" data-duration="3.5" data-track-index="0">
    <div class="ds-scene">
      <div class="ds-ambient" id="dsAmbient"></div>
      <div class="ds-sphere" id="dsSphere"></div>
      <div class="ds-core" id="dsCore">
        <span class="ds-core-icon" id="dsIcon"></span>
      </div>
    </div>
    <div class="ds-label hf-text-heading" id="dsLabel"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const accentColor = v.accentColor ?? '#9f75ff';
    const yPos = v.yPos ?? 50;
    const icon = v.icon ?? '🌐';
    const label = v.label ?? 'Data Sphere';
    const numPoints = v.points ?? 60;

    document.getElementById('dsW').style.top = yPos + '%';
    document.getElementById('dsIcon').textContent = icon;
    document.getElementById('dsLabel').textContent = label;
    document.getElementById('dsAmbient').style.background = accentColor;

    const sphere = document.getElementById('dsSphere');
    sphere.style.borderColor = accentColor + '44';
    sphere.style.boxShadow = `0 0 20px ${accentColor}33, inset 0 0 20px ${accentColor}11`;

    const core = document.getElementById('dsCore');
    core.style.background = `radial-gradient(circle, ${accentColor}55, ${accentColor}22)`;
    core.style.border = `1px solid ${accentColor}66`;
    core.style.boxShadow = `0 0 20px ${accentColor}44`;

    // Place dots on a sphere surface
    for (let i = 0; i < numPoints; i++) {
      const phi = Math.acos(2 * Math.random() - 1);
      const theta = 2 * Math.PI * Math.random();
      const r = 75;
      const x = r * Math.sin(phi) * Math.cos(theta) + 80;
      const y = r * Math.sin(phi) * Math.sin(theta) + 80;
      const z = r * Math.cos(phi);

      const dot = document.createElement('div');
      dot.className = 'ds-dot';
      dot.style.background = accentColor;
      dot.style.left = x + 'px';
      dot.style.top = y + 'px';
      dot.style.opacity = 0.3 + Math.random() * 0.5;
      dot.style.transform = `translateZ(${z}px)`;
      dot.style.boxShadow = `0 0 4px ${accentColor}`;
      sphere.appendChild(dot);
    }

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo('#dsW', { opacity: 0, scale: 0.85 }, { opacity: 1, scale: 1, duration: 0.5, ease: 'back.out(1.3)' }, 0);
    tl.fromTo('#dsCore', { opacity: 0, scale: 0 }, { opacity: 1, scale: 1, duration: 0.4, ease: 'elastic.out(1, 0.5)' }, 0.2);
    tl.fromTo('#dsLabel', { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.3 }, 0.4);
    gsap.to('#dsAmbient', { opacity: 0.3, duration: 2, yoyo: true, repeat: -1, ease: 'sine.inOut' });

    const dur = parseFloat(v.timingDuration ?? 3.5);
    tl.to('#dsW', { opacity: 0, scale: 0.9, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.5, 0.6));
  </script>
</body>
</html>
