<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Icon Label</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .il { display: flex; flex-direction: column; align-items: center; gap: 14px; will-change: transform, opacity; }
    .il-icon { line-height: 1; will-change: transform, opacity; }
    .il-text { font-size: 18px; font-weight: 600; letter-spacing: 0.04em; will-change: transform, opacity; }
    .il-glow { position: absolute; width: 140px; height: 140px; border-radius: 50%; filter: blur(50px); opacity: 0.2; z-index: -1; }
  </style>
</head>
<body>
  <div class="hf-center il" id="il" data-composition-id="icon-label" data-start="0" data-duration="2.5" data-track-index="0">
    <div class="il-glow" id="glow"></div>
    <div class="il-icon" id="iconEl"></div>
    <div class="il-text hf-text-body" id="label"></div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const accentColor = v.accentColor ?? v.color ?? '#9f75ff';
    const yPos = v.yPos ?? 50;
    document.getElementById('il').style.top = yPos + '%';
    document.getElementById('iconEl').textContent = v.icon ?? '🤖';
    document.getElementById('iconEl').style.fontSize = (v.iconSize ?? 56) + 'px';
    document.getElementById('label').textContent = v.label ?? v.text ?? '';
    document.getElementById('glow').style.background = accentColor;
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo('#glow', { opacity: 0, scale: 0.5 }, { opacity: 0.2, scale: 1, duration: 0.5 }, 0);
    tl.fromTo('#iconEl', { opacity: 0, scale: 0, rotation: -10 }, { opacity: 1, scale: 1, rotation: 0, duration: 0.4, ease: 'back.out(1.4)' }, 0.1);
    tl.fromTo('#label', { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.3 }, 0.2);
    tl.to('#glow', { opacity: 0.3, duration: 0.8, yoyo: true, repeat: -1, ease: 'sine.inOut' }, 0.5);
    const dur = parseFloat(v.timingDuration ?? 2.5);
    tl.to('#il', { opacity: 0, scale: 0.9, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.4, 0.5));
  </script>
</body>
</html>
