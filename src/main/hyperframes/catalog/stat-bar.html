<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Stat Bar</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .sb-w { width: min(820px, 78vw); will-change: transform, opacity; }
    .sb-items { display: flex; flex-direction: column; gap: 16px; }
    .sb-item { will-change: transform, opacity; }
    .sb-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
    .sb-label { font-size: 16px; font-weight: 500; color: var(--hf-muted); }
    .sb-value { font-size: 20px; font-weight: 700; }
    .sb-track { height: 8px; border-radius: 4px; background: rgba(255,255,255,0.08); overflow: hidden; }
    .sb-fill { height: 100%; border-radius: 4px; will-change: width; }
    .sb-title { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="hf-center sb-w" id="sbw" data-composition-id="stat-bar" data-start="0" data-duration="3.5" data-track-index="0">
    <div class="sb-title hf-text-heading" id="title"></div>
    <div class="sb-items" id="items"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const accentColor = v.accentColor ?? '#4ade80';
    const yPos = v.yPos ?? 50;
    const title = v.title ?? 'Performance Metrics';
    const bars = v.bars ?? [
      { label: 'Automation Rate', value: '92%', percent: 92 },
      { label: 'Cost Reduction', value: '68%', percent: 68 },
      { label: 'Speed Increase', value: '340%', percent: 85 }
    ];

    document.getElementById('sbw').style.top = yPos + '%';
    document.getElementById('title').textContent = title;
    const itemsEl = document.getElementById('items');

    const barEls = [];
    for (let i = 0; i < bars.length; i++) {
      const b = bars[i];
      const item = document.createElement('div'); item.className = 'sb-item';
      const colors = [accentColor, '#60a5fa', '#fbbf24', '#fb7185', '#2dd4bf'];
      const color = b.color ?? colors[i % colors.length];
      item.innerHTML = `
        <div class="sb-header">
          <span class="sb-label hf-text-body">${b.label}</span>
          <span class="sb-value hf-text-heading" style="color:${color}">${b.value}</span>
        </div>
        <div class="sb-track">
          <div class="sb-fill" id="fill-${i}" style="width:0%;background:${color}"></div>
        </div>`;
      itemsEl.appendChild(item);
      barEls.push({ fill: document.getElementById(`fill-${i}`), percent: b.percent });
    }

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo('#sbw', { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.4, ease: 'back.out(1.2)' }, 0);
    tl.fromTo('.sb-item', { opacity: 0, x: -12 }, { opacity: 1, x: 0, duration: 0.25, stagger: 0.08 }, 0.1);
    for (let i = 0; i < barEls.length; i++) {
      tl.to(barEls[i].fill, { width: barEls[i].percent + '%', duration: 0.6, ease: 'power2.out' }, 0.2 + i * 0.1);
    }

    const dur = parseFloat(v.timingDuration ?? 3.5);
    tl.to('#sbw', { opacity: 0, y: -12, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.5, 0.6));
  </script>
</body>
</html>
