<!DOCTYPE html>
<html data-width="720" data-height="1280">
<head>
  <meta charset="utf-8">
  <title>HyperFrames — Agent Avatar</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .aa-w { display: flex; flex-direction: column; align-items: center; gap: 20px;
      will-change: transform, opacity; }
    .aa-ring-outer { position: relative; width: 200px; height: 200px; }
    .aa-ring { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      border-radius: 50%; border: 2px solid; will-change: transform; }
    .aa-core { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
      width: 100px; height: 100px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      will-change: transform, opacity; }
    .aa-core-icon { font-size: 40px; }
    .aa-label { font-size: 22px; font-weight: 700; text-align: center; }
    .aa-status { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; }
    .aa-status-dot { width: 8px; height: 8px; border-radius: 50%; }
  </style>
</head>
<body>
  <div class="hf-center aa-w" id="aaW" data-composition-id="agent-avatar" data-start="0" data-duration="3.5" data-track-index="0">
    <div class="aa-ring-outer">
      <div class="aa-ring" id="r1" style="width:200px;height:200px;"></div>
      <div class="aa-ring" id="r2" style="width:160px;height:160px;"></div>
      <div class="aa-core" id="aaCore"><span class="aa-core-icon" id="aaIcon"></span></div>
    </div>
    <div class="aa-label hf-text-heading" id="aaLabel"></div>
    <div class="aa-status">
      <div class="aa-status-dot" id="aaDot"></div>
      <span id="aaStatus" class="hf-text-label"></span>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const v = window.__hyperframes?.getVariables?.() ?? {};
    const accentColor = v.accentColor ?? '#9f75ff';
    const yPos = v.yPos ?? 50;
    const icon = v.icon ?? '🤖';
    const label = v.label ?? 'Agent';
    const statusText = v.statusText ?? 'ONLINE';

    document.getElementById('aaW').style.top = yPos + '%';
    document.getElementById('aaIcon').textContent = icon;
    document.getElementById('aaLabel').textContent = label;
    document.getElementById('aaStatus').textContent = statusText;
    document.getElementById('aaDot').style.background = accentColor;
    document.getElementById('aaDot').style.boxShadow = `0 0 8px ${accentColor}`;

    const core = document.getElementById('aaCore');
    core.style.background = `radial-gradient(circle, ${accentColor}88, ${accentColor}33)`;
    core.style.border = `2px solid ${accentColor}aa`;
    core.style.boxShadow = `0 0 20px ${accentColor}55, inset 0 0 15px ${accentColor}33`;

    document.getElementById('r1').style.border = `2px solid ${accentColor}88`;
    document.getElementById('r1').style.boxShadow = `0 0 10px ${accentColor}33`;
    document.getElementById('r2').style.border = `1px solid ${accentColor}44`;

    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
    tl.fromTo('#aaW', { opacity: 0, scale: 0.85 }, { opacity: 1, scale: 1, duration: 0.5, ease: 'back.out(1.3)' }, 0);
    tl.fromTo('#aaCore', { opacity: 0, scale: 0 }, { opacity: 1, scale: 1, duration: 0.4, ease: 'elastic.out(1, 0.5)' }, 0.15);
    tl.fromTo('#aaLabel', { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.3 }, 0.3);
    tl.fromTo('#aaStatus', { opacity: 0 }, { opacity: 1, duration: 0.25 }, 0.4);

    gsap.to('#r1', { rotation: 360, duration: 10, repeat: -1, ease: 'none', transformOrigin: 'center center' });
    gsap.to('#r2', { rotation: -360, duration: 14, repeat: -1, ease: 'none', transformOrigin: 'center center' });
    gsap.to('#aaCore', { scale: 1.08, duration: 1.5, yoyo: true, repeat: -1, ease: 'sine.inOut' });

    const dur = parseFloat(v.timingDuration ?? 3.5);
    tl.to('#aaW', { opacity: 0, scale: 0.9, duration: 0.3, ease: 'power2.in' }, Math.max(dur - 0.5, 0.6));
  </script>
</body>
</html>
